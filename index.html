<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>신심 일기</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-database-compat.js"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --green:#5BAD80;--green2:#4a9a6e;--green-l:#EAF6EF;
  --blue:#7CB9E8;--blue-l:#EAF4FF;
  --pink:#F48FB1;--pink-l:#FFF0F5;
  --purple:#A78BFA;--purple-l:#F3EEFF;
  --teal:#4DB6AC;--teal-l:#E0F7F5;
  --amber:#F59E0B;--amber-l:#FEF3C7;
  --text:#1E2A38;--text2:#52687A;--text3:#A0B0BE;
  --bg:#F4F6F9;--surface:#FFFFFF;--border:#E8ECF2;
  --r:14px;--r-sm:9px;
  font-family:'Noto Sans KR',sans-serif;
}
body{background:var(--bg);color:var(--text);min-height:100vh;overflow-x:hidden}
#app{max-width:390px;margin:0 auto;min-height:100vh;background:var(--bg)}

/* LOGIN */
#loginScreen{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;padding:40px 24px;background:linear-gradient(160deg,#e8f5ee 0%,#f4f6f9 60%)}
.login-logo{width:72px;height:72px;background:linear-gradient(135deg,var(--green),var(--green2));border-radius:20px;display:flex;align-items:center;justify-content:center;font-size:32px;margin-bottom:20px;box-shadow:0 8px 24px rgba(91,173,128,.3)}
.login-title{font-size:26px;font-weight:900;color:var(--text);margin-bottom:6px}
.login-sub{font-size:14px;color:var(--text3);margin-bottom:48px}
.google-btn{display:flex;align-items:center;gap:12px;background:#fff;border:1.5px solid var(--border);border-radius:12px;padding:14px 24px;font-size:15px;font-weight:700;color:var(--text);cursor:pointer;transition:all .2s;box-shadow:0 2px 8px rgba(0,0,0,.06);width:100%;max-width:300px;justify-content:center}
.google-btn:hover{border-color:var(--green);box-shadow:0 4px 16px rgba(91,173,128,.2);transform:translateY(-1px)}
.google-icon{width:22px;height:22px}

/* TAB */
#tabBar{position:sticky;top:0;z-index:100;display:flex;height:44px;background:var(--surface);border-bottom:1.5px solid var(--border)}
.tab-btn{flex:1;border:none;background:transparent;font-family:inherit;font-size:12px;font-weight:600;color:var(--text3);cursor:pointer;border-bottom:2.5px solid transparent;transition:all .2s}
.tab-btn.active{color:var(--green);border-bottom-color:var(--green);font-weight:800}

/* USER BAR */
#userBar{display:flex;align-items:center;justify-content:space-between;padding:8px 12px;background:var(--surface);border-bottom:1px solid var(--border)}
.user-avatar{width:28px;height:28px;border-radius:50%;background:var(--green-l);border:2px solid var(--green);object-fit:cover}
.user-name{font-size:12px;font-weight:600;color:var(--text2)}
.logout-btn{font-size:11px;color:var(--text3);background:none;border:none;cursor:pointer;padding:4px 8px;border-radius:6px}
.logout-btn:hover{background:var(--bg);color:var(--text)}

#mainContent{padding-bottom:20px}

/* SECTION CARD */
.section-card{margin:0 12px 2px;background:var(--surface);border-radius:var(--r);overflow:hidden}
.section-header{display:flex;align-items:center;justify-content:space-between;padding:12px 14px 8px}
.section-title{font-size:13px;font-weight:800}
.section-title.green{color:var(--green)}.section-title.pink{color:var(--pink)}
.section-title.blue{color:var(--blue)}.section-title.purple{color:var(--purple)}
.section-title.teal{color:var(--teal)}.section-title.amber{color:var(--amber)}
.section-body{padding:0 14px 14px}

/* DATE NAV — FIX2 year small / FIX3 uniform btn sizes */
.date-nav{position:sticky;top:44px;z-index:50;display:flex;align-items:center;height:56px;gap:6px;border-bottom:1px solid var(--border);background:var(--surface);padding:0 10px}
.nav-btn{width:36px;height:36px;border-radius:9px;border:1.5px solid var(--border);background:var(--surface);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700;color:var(--text3);flex-shrink:0;transition:border-color .15s;font-family:inherit}
.nav-btn:hover{border-color:var(--text3)}
.date-display{flex:1;text-align:center;line-height:1}
.date-year{font-size:11px;font-weight:500;color:var(--text3);margin-bottom:2px}
.date-main{font-size:17px;font-weight:800;color:var(--text)}
.today-btn{height:36px;border-radius:9px;border:none;background:var(--green-l);color:var(--green);font-size:12px;font-weight:700;padding:0 14px;cursor:pointer;flex-shrink:0;font-family:inherit}

.save-btn{position:fixed;bottom:18px;left:50%;transform:translateX(-50%);background:var(--green);border:none;color:#fff;font-size:14px;font-weight:800;border-radius:24px;padding:13px 40px;cursor:pointer;box-shadow:0 4px 20px rgba(91,173,128,.4);z-index:80;font-family:inherit}

/* INPUT */
.field-input{height:34px;border:1.5px solid var(--border);border-radius:var(--r-sm);background:var(--bg);padding:0 10px;font-size:13px;color:var(--text);font-family:inherit;outline:none;transition:border-color .2s}
.field-input:focus{border-color:var(--green)}
.field-select{appearance:none;cursor:pointer}
.progress-bar-wrap{height:6px;background:var(--border);border-radius:99px;overflow:hidden;margin-top:10px}
.progress-bar-fill{height:100%;background:linear-gradient(90deg,var(--green),var(--green2));border-radius:99px;transition:width .4s}

/* DRAG ROW — FIX7 aligned */
.drag-row{display:flex;align-items:center;gap:5px;margin-bottom:6px}
.drag-handle{color:var(--text3);font-size:16px;flex-shrink:0;cursor:grab;width:18px;text-align:center}
/* FIX4 del btn — no bg, gray */
.del-btn{flex-shrink:0;width:22px;height:22px;border-radius:50%;border:none;background:transparent;color:#c5d0dc;font-size:13px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:color .15s}
.del-btn:hover{color:#ef4444}
.add-row-btn{display:flex;align-items:center;gap:6px;padding:5px 10px;border-radius:var(--r-sm);border:1.5px dashed var(--border);background:transparent;color:var(--green);font-size:12px;font-weight:700;cursor:pointer;margin-top:4px;transition:all .2s;font-family:inherit}
.add-row-btn:hover{border-color:var(--green);background:var(--green-l)}

/* FIX5 CUSTOM GROUPED DROPDOWN */
.csel-wrap{position:relative;flex-shrink:0}
.csel-trigger{height:34px;border:1.5px solid var(--border);border-radius:var(--r-sm);background:var(--bg);padding:0 22px 0 10px;font-size:13px;color:var(--text);font-family:inherit;cursor:pointer;display:flex;align-items:center;white-space:nowrap;min-width:80px;position:relative;user-select:none;transition:border-color .2s}
.csel-trigger::after{content:'';position:absolute;right:7px;top:50%;transform:translateY(-50%);border-left:4px solid transparent;border-right:4px solid transparent;border-top:5px solid var(--text3)}
.csel-trigger.open{border-color:var(--green)}
.csel-dropdown{position:absolute;top:calc(100% + 2px);left:0;z-index:600;background:var(--surface);border:1.5px solid var(--border);border-radius:var(--r-sm);box-shadow:0 4px 20px rgba(0,0,0,.12);min-width:120px;overflow:hidden;display:none}
.cdrop-label{padding:6px 12px 3px;font-size:10px;font-weight:800;color:var(--text3);background:var(--bg);letter-spacing:.05em}
.cdrop-opt{padding:8px 12px 8px 20px;font-size:13px;color:var(--text);cursor:pointer;transition:background .1s}
.cdrop-opt:hover{background:var(--green-l);color:var(--green)}
.cdrop-opt.sel{color:var(--green);font-weight:700}
.cdrop-opt.direct{padding-left:12px}

/* COLLECTION */
.search-wrap{position:relative;padding:8px 12px}
.search-icon{position:absolute;left:22px;top:50%;transform:translateY(-50%);color:var(--text3);font-size:14px}
.search-input{height:36px;width:100%;border:1.5px solid var(--border);border-radius:var(--r-sm);background:var(--bg);padding:0 12px 0 32px;font-size:13px;color:var(--text);font-family:inherit;outline:none}
.search-input:focus{border-color:var(--green)}
.filter-pills{display:flex;gap:8px;overflow-x:auto;padding:0 12px 12px;scrollbar-width:none}
.filter-pills::-webkit-scrollbar{display:none}
.pill{flex-shrink:0;border:none;border-radius:99px;padding:6px 12px;font-size:11px;font-weight:600;cursor:pointer;transition:all .2s;font-family:inherit}
.pill.green-inactive{background:var(--green-l);color:var(--green)}.pill.green-active{background:var(--green);color:#fff}
.pill.pink-inactive{background:var(--pink-l);color:var(--pink)}.pill.pink-active{background:var(--pink);color:#fff}
.pill.blue-inactive{background:var(--blue-l);color:var(--blue)}.pill.blue-active{background:var(--blue);color:#fff}
.pill.purple-inactive{background:var(--purple-l);color:var(--purple)}.pill.purple-active{background:var(--purple);color:#fff}
.pill.teal-inactive{background:var(--teal-l);color:var(--teal)}.pill.teal-active{background:var(--teal);color:#fff}
.record-card{background:var(--surface);border-radius:var(--r);padding:14px;margin-bottom:10px}
.record-date-row{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px}
.record-date{font-size:13px;font-weight:800;color:var(--text)}
.record-badge{font-size:10px;font-weight:700;padding:3px 8px;border-radius:99px}
.badge-green{background:var(--green-l);color:var(--green)}.badge-pink{background:var(--pink-l);color:var(--pink)}
.badge-blue{background:var(--blue-l);color:var(--blue)}.badge-purple{background:var(--purple-l);color:var(--purple)}
.badge-teal{background:var(--teal-l);color:var(--teal)}.badge-amber{background:var(--amber-l);color:var(--amber)}
.record-row{display:flex;align-items:flex-start;gap:8px;margin-bottom:6px;font-size:12px}

/* FIX3 STICKY BARS uniform icon-btn */
.coll-sticky,.cal-sticky{position:sticky;top:44px;z-index:50;display:flex;align-items:center;justify-content:space-between;height:52px;border-bottom:1px solid var(--border);background:var(--surface);padding:0 12px}
.cal-sticky{padding:0 16px}
.icon-btn{width:36px;height:36px;border:1.5px solid var(--border);border-radius:9px;background:var(--surface);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700;color:var(--text3);font-family:inherit;transition:border-color .15s}
.icon-btn:hover{border-color:var(--text3)}
.copy-btn{height:36px;border:1.5px solid var(--purple);background:var(--surface);color:var(--purple);font-size:12px;font-weight:700;border-radius:9px;padding:0 12px;cursor:pointer;font-family:inherit;transition:all .2s}
.copy-btn.copied{background:var(--green-l);border-color:var(--green);color:var(--green)}

/* CALENDAR */
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr)}
.cal-day-header{padding:8px 0;text-align:center;font-size:11px;font-weight:600;border-bottom:1px solid var(--border);background:var(--surface)}
.cal-day-header.sun{color:var(--pink)}.cal-day-header.sat{color:var(--blue)}.cal-day-header.weekday{color:var(--text3)}
.cal-cell{aspect-ratio:1;background:var(--surface);display:flex;flex-direction:column;align-items:center;padding:4px 2px;cursor:pointer;border:.5px solid var(--border);transition:background .15s}
.cal-cell:hover{background:var(--green-l)}.cal-cell.today{outline:2px solid var(--green);outline-offset:-2px}.cal-cell.selected{background:var(--green-l)}
.cal-cell-num{font-size:12px;font-weight:600}.cal-cell-num.sun{color:var(--pink)}.cal-cell-num.sat{color:var(--blue)}.cal-cell-num.today{color:var(--green)}
.cal-dots{display:flex;gap:2px;margin-top:2px}.cal-dot{width:5px;height:5px;border-radius:50%}
.cal-dot-green{background:var(--green)}.cal-dot-pink{background:var(--pink)}.cal-dot-blue{background:var(--blue)}

/* FOREST */
.marquee-wrap{background:linear-gradient(90deg,var(--green),var(--green2));padding:10px 14px;display:flex;align-items:center;gap:8px;overflow:hidden}
.marquee-text{white-space:nowrap;font-size:13px;font-weight:600;color:#fff;animation:marquee 24s linear infinite}
@keyframes marquee{0%{transform:translateX(110%)}100%{transform:translateX(-200%)}}
.msg-edit-btn{flex-shrink:0;width:28px;height:28px;border-radius:50%;background:rgba(255,255,255,.2);border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:14px}
.period-row{display:flex;align-items:center;justify-content:space-between;padding:8px 12px 4px}
.period-text{font-size:12px;color:var(--text3);display:flex;align-items:center;gap:6px}
.chart-settings-btn{display:flex;align-items:center;gap:4px;border:1px solid var(--border);border-radius:99px;background:var(--surface);color:var(--text3);font-size:10px;font-weight:600;padding:3px 8px;cursor:pointer;font-family:inherit;transition:all .2s}
.chart-settings-btn:hover{border-color:var(--green);color:var(--green)}
.stat-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:6px;padding:10px 12px}
.stat-card{border-radius:10px;padding:8px;display:flex;flex-direction:column;align-items:center}
.stat-icon{font-size:16px}.stat-value{font-size:14px;font-weight:900;color:var(--text);line-height:1.2;margin-top:2px}.stat-label{font-size:9px;font-weight:600;color:var(--text3)}
.stat-sky{background:linear-gradient(135deg,#e0f2fe,#bfdbfe)}.stat-green{background:var(--green-l)}.stat-cyan{background:#e0f7fa}
.forest-card{background:var(--surface);border-radius:var(--r);padding:14px;margin:0 12px 10px}
.forest-card-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px}
.forest-card-title{font-size:14px;font-weight:800;color:var(--text);display:flex;align-items:center;gap:6px}
.progress-badge{background:var(--green-l);color:var(--green);font-size:11px;font-weight:700;padding:4px 10px;border-radius:99px}
.prayer-box{background:linear-gradient(135deg,var(--green-l),var(--blue-l));border-radius:10px;padding:10px 12px;margin-bottom:12px;text-align:center;font-size:11px;font-style:italic;color:var(--text2)}
.chart-grid{display:grid;grid-template-columns:repeat(14,1fr);gap:3px}
.chart-cell{aspect-ratio:1;border-radius:4px}
.cell-0{background:#e8f5ee}.cell-1{background:#c6e6d3}.cell-2{background:#8fcfaa}.cell-3{background:#5BAD80}.cell-4{background:#4a9a6e}.cell-5{background:#3d8a5e}.cell-unfilled{background:#f0f2f5}
.legend-row{display:flex;align-items:center;justify-content:center;gap:4px;font-size:9px;color:var(--text3);margin-top:10px}
.legend-cell{width:12px;height:12px;border-radius:3px}
.tree-count{text-align:center;font-size:13px;font-weight:600;color:var(--text);margin-top:6px}
.tree-count span{color:var(--green);font-weight:900;font-size:16px}
.progress-info{display:flex;justify-content:space-between;font-size:11px;color:var(--text3);margin-top:10px}
.progress-info strong{color:var(--green)}
.progress-bar-wrap-2{height:6px;background:var(--border);border-radius:99px;overflow:hidden;margin-top:6px}
.progress-bar-fill-2{height:100%;background:linear-gradient(90deg,var(--green),var(--green2));border-radius:99px}
.activity-card{background:var(--surface);border-radius:var(--r);padding:14px;margin:0 12px 10px}
.activity-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px}
.activity-title{font-size:14px;font-weight:800;color:var(--text);display:flex;align-items:center;gap:6px}
.activity-count{font-size:18px;font-weight:900}
.count-pink{color:var(--pink)}.count-amber{color:var(--amber)}
.heart-grid{display:flex;flex-wrap:wrap;gap:4px}
.heart-cell{width:30px;height:30px;border-radius:6px;display:flex;align-items:center;justify-content:center;font-size:16px;background:#fce7f0}
.handshake-grid{display:flex;flex-wrap:wrap;gap:5px}
.handshake-cell{width:34px;height:34px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:18px;background:#fef3c7}

/* FIX6 STUDY CARDS redesigned */
.study-card{background:var(--surface);border-radius:var(--r);padding:14px;margin:0 12px 10px}
.study-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px}
.study-title{font-size:14px;font-weight:800;color:var(--text);display:flex;align-items:center;gap:6px}
.study-total{font-size:12px;font-weight:700}
.study-total-book{color:#7e57c2}.study-total-essay{color:#4f46e5}
.book-tags-wrap{display:flex;flex-wrap:wrap;gap:8px}
.book-tag{display:inline-flex;align-items:center;gap:5px;padding:5px 11px;border-radius:99px;font-size:11px;font-weight:500;background:#f3eeff;color:#6d28d9}
.book-tag-p{font-weight:700;color:#7e57c2}
.essay-tag{display:inline-flex;align-items:center;gap:5px;padding:5px 11px;border-radius:99px;font-size:11px;font-weight:500;background:#eef2ff;color:#3730a3}
.essay-tag-p{font-weight:700;color:#4f46e5}

/* MODALS */
.modal-backdrop{position:fixed;inset:0;z-index:200;background:rgba(0,0,0,.5);display:flex;align-items:center;justify-content:center;padding:20px}
.modal-box{background:var(--surface);border-radius:var(--r);padding:20px;width:100%;max-width:360px;max-height:90vh;overflow-y:auto}
.modal-title{font-size:16px;font-weight:800;text-align:center;margin-bottom:16px}
.modal-label{font-size:12px;font-weight:600;color:var(--text2);margin-bottom:6px;display:block}
.modal-input{width:100%;border:1.5px solid var(--border);border-radius:var(--r-sm);background:var(--bg);padding:8px 12px;font-size:13px;color:var(--text);font-family:inherit;outline:none;transition:border-color .2s}
.modal-input:focus{border-color:var(--green)}
.modal-textarea{resize:none;min-height:80px}
.modal-row{margin-bottom:14px}.modal-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:14px}
.modal-btns{display:flex;gap:10px;margin-top:16px}
.btn-cancel{flex:1;border:1.5px solid var(--border);background:var(--surface);color:var(--text2);border-radius:var(--r-sm);padding:10px;font-size:13px;font-weight:700;cursor:pointer;font-family:inherit}
.btn-save{flex:1;background:var(--green);color:#fff;border:none;border-radius:var(--r-sm);padding:10px;font-size:13px;font-weight:700;cursor:pointer;font-family:inherit}
.acc-item{border:1px solid var(--border);border-radius:10px;overflow:hidden;margin-bottom:6px}
.acc-btn{display:flex;width:100%;align-items:center;justify-content:space-between;background:none;border:none;padding:12px 14px;cursor:pointer;font-family:inherit;text-align:left}
.acc-name{font-size:13px;font-weight:600;color:var(--text)}.acc-right{display:flex;align-items:center;gap:6px}
.acc-chevron{transition:transform .2s;font-size:12px;color:var(--text3)}.acc-chevron.open{transform:rotate(180deg)}
.acc-body{border-top:1px solid var(--border);padding:8px 14px;background:#fafbfc}
.acc-row{display:flex;justify-content:space-between;font-size:11px;padding:3px 0}
#toast{position:fixed;bottom:80px;left:50%;transform:translateX(-50%);background:#1e2a38;color:#fff;font-size:13px;font-weight:600;padding:10px 20px;border-radius:99px;z-index:300;opacity:0;transition:opacity .3s;pointer-events:none;white-space:nowrap}
#toast.show{opacity:1}
.hidden{display:none!important}
</style>
</head>
<body>
<div id="app">

<!-- LOGIN -->
<div id="loginScreen">
  <div class="login-logo">🌿</div>
  <div class="login-title">신심 일기</div>
  <div class="login-sub">나의 신행학을 기록하는 공간</div>
  <button class="google-btn" onclick="loginWithGoogle()">
    <svg class="google-icon" viewBox="0 0 24 24">
      <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/>
      <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
      <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"/>
      <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/>
    </svg>
    Google로 로그인
  </button>
</div>

<!-- MAIN APP -->
<div id="mainApp" class="hidden">
  <div id="userBar">
    <div style="display:flex;align-items:center;gap:8px">

<script>
// FIREBASE
const FB = {apiKey:"AIzaSyBfake-replace-me",authDomain:"shinsim-diary.firebaseapp.com",databaseURL:"https://shinsim-diary-default-rtdb.firebaseio.com",projectId:"shinsim-diary",storageBucket:"shinsim-diary.appspot.com",messagingSenderId:"000000000000",appId:"1:000000000000:web:fakeid"};
let db=null; try{firebase.initializeApp(FB);db=firebase.database();}catch(e){}
let currentUser=null;
function loginWithGoogle(){
  if(!FB.apiKey||FB.apiKey==="AIzaSyBfake-replace-me"){currentUser={uid:'demo',displayName:'데모 사용자',email:'demo@demo.com',photoURL:null};onLoginSuccess();return;}
  const p=new firebase.auth.GoogleAuthProvider();
  firebase.auth().signInWithPopup(p).then(r=>{currentUser=r.user;onLoginSuccess();}).catch(()=>{currentUser={uid:'demo',displayName:'데모 사용자',email:'demo@demo.com',photoURL:null};onLoginSuccess();});
}
function logout(){try{firebase.auth().signOut();}catch(e){}currentUser=null;document.getElementById('loginScreen').classList.remove('hidden');document.getElementById('mainApp').classList.add('hidden');}
function onLoginSuccess(){
  document.getElementById('loginScreen').classList.add('hidden');
  document.getElementById('mainApp').classList.remove('hidden');
  document.getElementById('userName').textContent=currentUser.displayName||currentUser.email;
  document.getElementById('userAvatar').src=currentUser.photoURL||`https://ui-avatars.com/api/?name=${encodeURIComponent(currentUser.displayName||'U')}&background=5BAD80&color=fff&size=56`;
  initApp();
}
function saveData(k,v){localStorage.setItem('shinsim_'+k,JSON.stringify(v));if(db&&currentUser)try{db.ref(`users/${currentUser.uid}/${k}`).set(v);}catch(e){}}
function loadData(k,d){const r=localStorage.getItem('shinsim_'+k);if(r)try{return JSON.parse(r);}catch(e){}return d;}
function deepClone(x){return JSON.parse(JSON.stringify(x));}
function escHtml(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
function showToast(m){const t=document.getElementById('toast');t.textContent=m;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),2500);}

// STATE
let currentDate=new Date();
let records=loadData('records',{});
let haengItems=[],hakItems=[],memberItems=[],scheduleItems=[];
let chartConfig=loadData('chartConfig',{startDate:'2026-03-01',endDate:'2026-04-30',prayer:'세계 평화와 일체 중생의 행복을 기원합니다',goalMinutes:3000,completedMinutes:2340});
let messages=loadData('messages',['오늘도 정진하는 당신이 멋져요! 💪✨','꾸준함이 기적을 만들어요. 🌱🌟','오늘의 작은 실천이 내일의 큰 변화로 이어집니다 🌸💚','포기하지 않는 당신을 응원해요! 👏✨']);
let tempMessages=[...messages];
let reportText=loadData('reportText','<서울8방면 신강북권 총합권여자부장 오선민>\n\n\n\n안녕하세요! 신행학 보고드립니다!\n\n');
let collectionFilter='all',collectionMonth=new Date(),calendarMonth=new Date();
const DAYS=['일','월','화','수','목','금','토'];
const SIN_GOAL=90;

// TABS
document.querySelectorAll('.tab-btn').forEach(btn=>{
  btn.addEventListener('click',()=>{
    document.querySelectorAll('.tab-btn').forEach(b=>b.classList.remove('active'));
    btn.classList.add('active');
    const tab=btn.dataset.tab;
    ['record','collection','calendar','forest'].forEach(t=>document.getElementById('tab-'+t).classList.toggle('hidden',t!==tab));
    closeAllDropdowns();
    if(tab==='collection')renderCollection();
    if(tab==='calendar')renderCalendar();
    if(tab==='forest')renderForest();
  });
});

// DATES
function formatDate(d){return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;}
function formatTime(min){const h=Math.floor(min/60),m=min%60;if(!min)return'';if(h===0)return`${m}m`;return m===0?`${h}h`:`${h}h ${m}m`;}
// FIX2
function updateDateDisplay(){
  const ld=formatDate(currentDate);
  document.getElementById('dateYear').textContent=currentDate.getFullYear();
  document.getElementById('dateMain').textContent=`${currentDate.getMonth()+1}/${currentDate.getDate()}(${DAYS[currentDate.getDay()]})`;
  loadRecordForDate(ld);
}
function changeDate(d){currentDate.setDate(currentDate.getDate()+d);updateDateDisplay();}
function goToday(){currentDate=new Date();updateDateDisplay();}
// FIX1
function updateSin(){
  const v=parseInt(document.getElementById('sinInput').value)||0;
  document.getElementById('sinDisplay').textContent=v?`→ ${formatTime(v)}`:'';
  const pct=Math.min(100,Math.round(v/SIN_GOAL*100));
  document.getElementById('sinProgress').style.width=pct+'%';
  document.getElementById('sinPct').textContent=v?pct+'%':'0%';
}

// FIX5 GROUPED DROPDOWN ENGINE
const HAENG_GROUPS=[
  {label:'활동',opts:['대화','통화','연락','칸나']},
  {label:'회합',opts:['좌담회','창제회','협의']},
  {label:null,opts:['직접입력']},
];
const DEFAULT_TYPE='대화';
function haengTypeToCategory(t){
  if(['대화','통화','연락','칸나'].includes(t))return'활동';
  if(['좌담회','창제회','협의'].includes(t))return'회합';
  return'기타';
}
function buildDropHTML(groups,selVal,cbName){
  return groups.map(g=>{
    let h='';
    if(g.label)h+=`<div class="cdrop-label">${g.label}</div>`;
    g.opts.forEach(o=>{
      const cls=`cdrop-opt${o==='직접입력'?' direct':''}${o===selVal?' sel':''}`;
      h+=`<div class="${cls}" onclick="${cbName}('${o}')">${o}</div>`;
    });
    return h;
  }).join('');
}
let _activeDropdown=null;
function closeAllDropdowns(){
  document.querySelectorAll('.csel-dropdown').forEach(d=>d.style.display='none');
  document.querySelectorAll('.csel-trigger').forEach(t=>t.classList.remove('open'));
  _activeDropdown=null;
}
function openDropdown(trig,drop){
  closeAllDropdowns();
  drop.style.display='block';
  trig.classList.add('open');
  _activeDropdown={trig,drop};
  setTimeout(()=>{
    function outside(e){if(!trig.contains(e.target)&&!drop.contains(e.target)){closeAllDropdowns();document.removeEventListener('click',outside);}}
    document.addEventListener('click',outside);
  },0);
}
function toggleDrop(trigId,dropId){
  const trig=document.getElementById(trigId),drop=document.getElementById(dropId);
  if(drop.style.display==='block')closeAllDropdowns();else openDropdown(trig,drop);
}

// HAENG FIX5,7
function renderHaeng(){
  document.getElementById('haengRows').innerHTML=haengItems.map((item,i)=>{
    const lbl=item.type||DEFAULT_TYPE;
    const dh=buildDropHTML(HAENG_GROUPS,lbl,`_hsel${i}`);
    return `<div class="drag-row" style="align-items:flex-start">
      <span class="drag-handle" style="margin-top:8px">⠿</span>
      <div style="display:flex;gap:5px;flex:1;flex-wrap:wrap">
        <div class="csel-wrap" style="width:82px">
          <div class="csel-trigger" id="hTrig${i}" onclick="toggleDrop('hTrig${i}','hDrop${i}')">${escHtml(lbl)}</div>
          <div class="csel-dropdown" id="hDrop${i}">${dh}</div>
        </div>
        <input type="text" class="field-input" style="flex:1;min-width:90px" placeholder="이름"
          value="${escHtml(item.name)}" oninput="haengItems[${i}].name=this.value">
        ${item.type==='직접입력'?`<input type="text" class="field-input" style="width:72px" placeholder="유형" value="${escHtml(item.customType||'')}" oninput="haengItems[${i}].customType=this.value"`:''}
      </div>
      <button class="del-btn" style="margin-top:6px" onclick="delHaeng(${i})">✕</button>
    </div>`;
  }).join('');
  haengItems.forEach((_,i)=>{
    window[`_hsel${i}`]=function(v){haengItems[i].type=v;haengItems[i].category=haengTypeToCategory(v);renderHaeng();};
  });
}
function addHaeng(){haengItems.push({id:Date.now()+'',name:'',type:DEFAULT_TYPE,category:'활동',customType:''});renderHaeng();}
function delHaeng(i){haengItems.splice(i,1);renderHaeng();}

// HAK FIX7
function renderHak(){
  document.getElementById('hakRows').innerHTML=hakItems.map((item,i)=>`
    <div class="drag-row">
      <span class="drag-handle">⠿</span>
      <select class="field-input field-select" style="width:82px;flex-shrink:0" onchange="hakItems[${i}].bookType=this.value">
        ${['도서','어서','정기간행물'].map(t=>`<option value="${t}" ${item.bookType===t?'selected':''}>${t}</option>`).join('')}
      </select>
      <input type="text" class="field-input" style="flex:1;min-width:80px" placeholder="도서/어서명"
        value="${escHtml(item.bookName)}" oninput="hakItems[${i}].bookName=this.value">
      <input type="number" class="field-input" style="width:52px;text-align:center;flex-shrink:0" placeholder="p.시작"
        value="${escHtml(item.startPage)}" oninput="hakItems[${i}].startPage=this.value">
      <span style="font-size:11px;color:var(--text3);flex-shrink:0">~</span>
      <input type="number" class="field-input" style="width:52px;text-align:center;flex-shrink:0" placeholder="p.끝"
        value="${escHtml(item.endPage)}" oninput="hakItems[${i}].endPage=this.value">
      <button class="del-btn" onclick="delHak(${i})">✕</button>
    </div>`).join('');
}
function addHak(){hakItems.push({id:Date.now()+'',bookType:'도서',bookName:'',startPage:'',endPage:''});renderHak();}
function delHak(i){hakItems.splice(i,1);renderHak();}

// SAVE/LOAD
function saveRecord(){
  const key=formatDate(currentDate);
  records[key]={
    sin:parseInt(document.getElementById('sinInput').value)||0,
    haeng:deepClone(haengItems),hak:deepClone(hakItems),
    speech:document.getElementById('speechInput').value,
    resolution:document.getElementById('resolutionInput').value,
    members:deepClone(memberItems),
    schedule:deepClone(scheduleItems), // NOT aggregated in collection/forest
  };
  saveData('records',records);
  updateForestFromRecords();
  showToast('저장되었습니다 🌸');
}
function loadRecordForDate(key){
  const r=records[key];
  document.getElementById('sinInput').value=r?r.sin||'':'';
  updateSin();
  haengItems=r&&r.haeng?deepClone(r.haeng):[{id:'1',name:'',type:DEFAULT_TYPE,category:'활동',customType:''}];
  hakItems=r&&r.hak?deepClone(r.hak):[{id:'1',bookType:'도서',bookName:'',startPage:'',endPage:''}];
  memberItems=r&&r.members?deepClone(r.members):[{id:'1',name:'',memo:''}];
  scheduleItems=r&&r.schedule?deepClone(r.schedule):[{id:'1',date:'',name:'',type:DEFAULT_TYPE,companion:''}];
  document.getElementById('speechInput').value=r?r.speech||'':'';
  document.getElementById('resolutionInput').value=r?r.resolution||'':'';
  renderHaeng();renderHak();renderMembers();renderSchedule();
}

// COLLECTION
const filterDefs=[{id:'all',label:'전체',color:'green'},{id:'sin',label:'창제',color:'green'},{id:'haeng',label:'활동',color:'pink'},{id:'hak',label:'연찬',color:'blue'},{id:'speech',label:'스피치',color:'purple'},{id:'resolution',label:'결의',color:'teal'},{id:'member',label:'멤버',color:'teal'}];
function renderFilterPills(){document.getElementById('filterPills').innerHTML=filterDefs.map(f=>{const a=collectionFilter===f.id;return`<button class="pill ${f.color}-${a?'active':'inactive'}" onclick="setFilter('${f.id}')">${f.label}</button>`;}).join('');}
function setFilter(f){collectionFilter=f;renderFilterPills();renderCollectionContent();}
function collChangeMonth(d){collectionMonth.setMonth(collectionMonth.getMonth()+d);document.getElementById('collMonthLabel').textContent=`${collectionMonth.getFullYear()}년 ${collectionMonth.getMonth()+1}월`;renderCollection();}
function getMonthRecords(){const y=collectionMonth.getFullYear(),m=collectionMonth.getMonth()+1;return Object.entries(records).filter(([k])=>{const p=k.split('-');return+p[0]===y&&+p[1]===m;}).sort((a,b)=>b[0].localeCompare(a[0])).map(([k,v])=>({date:k,...v}));}
function renderCollection(){document.getElementById('collMonthLabel').textContent=`${collectionMonth.getFullYear()}년 ${collectionMonth.getMonth()+1}월`;renderFilterPills();renderCollectionContent();}
function renderCollectionContent(){
  const recs=getMonthRecords(),q=document.getElementById('searchInput').value.toLowerCase(),wrap=document.getElementById('collectionContent');
  if(collectionFilter==='hak'){wrap.innerHTML=renderHakSec(recs);return;}
  if(collectionFilter==='haeng'){wrap.innerHTML=renderHaengSec(recs);return;}
  if(collectionFilter==='sin'){wrap.innerHTML=renderSinSec(recs);return;}
  const fil=recs.filter(r=>!q||JSON.stringify(r).toLowerCase().includes(q));
  if(!fil.length){wrap.innerHTML=`<div style="text-align:center;padding:40px;color:var(--text3);font-size:13px">기록이 없습니다</div>`;return;}
  wrap.innerHTML=fil.map(r=>{
    const d=new Date(r.date),ds=`${d.getFullYear()}. ${d.getMonth()+1}. ${d.getDate()} (${DAYS[d.getDay()]})`;
    return`<div class="record-card">
      <div class="record-date-row"><span class="record-date">${ds}</span>${r.sin?`<span class="record-badge badge-green">${formatTime(r.sin)}</span>`:''}</div>
      ${(r.haeng||[]).length&&(collectionFilter==='all'||collectionFilter==='haeng')?`<div class="record-row"><span class="record-badge badge-pink">활동</span><div>${(r.haeng||[]).map(h=>`<div style="font-size:12px;color:var(--text)">${escHtml(h.name||'')} <span style="color:var(--text3)">${h.type||''}</span></div>`).join('')}</div></div>`:''}
      ${(r.hak||[]).length&&(collectionFilter==='all'||collectionFilter==='hak')?`<div class="record-row"><span class="record-badge badge-blue">연찬</span><div>${(r.hak||[]).map(h=>`<div style="font-size:12px;color:var(--text)">${escHtml(h.bookName||'')} p.${h.startPage}~${h.endPage}</div>`).join('')}</div></div>`:''}
      ${r.speech&&(collectionFilter==='all'||collectionFilter==='speech')?`<div class="record-row"><span class="record-badge badge-purple">스피치</span><span style="font-size:12px;color:var(--text)">${escHtml(r.speech)}</span></div>`:''}
      ${r.resolution&&(collectionFilter==='all'||collectionFilter==='resolution')?`<div class="record-row"><span class="record-badge badge-teal">결의</span><span style="font-size:12px;color:var(--text)">${escHtml(r.resolution)}</span></div>`:''}
      ${(r.members||[]).length&&(collectionFilter==='all'||collectionFilter==='member')?`<div class="record-row"><span class="record-badge badge-amber" style="background:var(--amber-l);color:var(--amber)">멤버</span><span style="font-size:12px;color:var(--text)">${(r.members||[]).map(m=>escHtml(m.name)+(m.memo?` (${escHtml(m.memo)})`:'')).join(', ')}</span></div>`:''}
    </div>`;
  }).join('');
}
function renderSinSec(recs){if(!recs.length)return'<div style="text-align:center;padding:40px;color:var(--text3);font-size:13px">창제 기록이 없습니다</div>';const tot=recs.reduce((s,r)=>s+(r.sin||0),0);return`<div class="record-card"><div style="font-size:13px;font-weight:700;color:var(--text2);margin-bottom:10px">총 창제 시간: <span style="color:var(--green);font-weight:900">${formatTime(tot)}</span></div>${recs.map(r=>`<div style="display:flex;justify-content:space-between;padding:6px 0;border-bottom:1px solid var(--border);font-size:12px"><span style="color:var(--text2)">${r.date}</span><span style="font-weight:700;color:var(--green)">${formatTime(r.sin||0)}</span></div>`).join('')}</div>`;}
function renderHaengSec(recs){const all=recs.flatMap(r=>(r.haeng||[]).map(h=>({...h,date:r.date})));if(!all.length)return'<div style="text-align:center;padding:40px;color:var(--text3);font-size:13px">활동 기록이 없습니다</div>';return`<div class="record-card">${all.map(h=>`<div style="display:flex;justify-content:space-between;padding:6px 0;border-bottom:1px solid var(--border);font-size:12px"><span style="color:var(--text)">${escHtml(h.name||'')} <span style="color:var(--text3)">${h.type||''}</span></span><span style="color:var(--text3)">${h.date}</span></div>`).join('')}</div>`;}
function renderHakSec(recs){const books={};recs.forEach(r=>(r.hak||[]).forEach(h=>{if(!books[h.bookName])books[h.bookName]={records:[]};books[h.bookName].records.push({date:r.date,startPage:h.startPage,endPage:h.endPage});}));if(!Object.keys(books).length)return'<div style="text-align:center;padding:40px;color:var(--text3);font-size:13px">연찬 기록이 없습니다</div>';return Object.entries(books).map(([name,data])=>{const tot=data.records.reduce((s,r)=>s+Math.max(0,(+r.endPage||0)-(+r.startPage||0)+1),0);return`<div class="acc-item"><button class="acc-btn" onclick="toggleAcc(this)"><span class="acc-name">${escHtml(name)}</span><div class="acc-right"><span style="font-size:11px;font-weight:700;color:var(--blue)">${tot}p</span><span class="acc-chevron">▾</span></div></button><div class="acc-body" style="display:none">${data.records.map(r=>`<div class="acc-row"><span style="color:var(--text3)">${r.date}</span><span style="color:var(--blue);font-weight:600">p.${r.startPage}~${r.endPage}</span></div>`).join('')}</div></div>`;}).join('');}
function toggleAcc(btn){const body=btn.nextElementSibling,chev=btn.querySelector('.acc-chevron'),isOpen=body.style.display!=='none';body.style.display=isOpen?'none':'block';if(chev)chev.classList.toggle('open',!isOpen);}
function copyReport(){navigator.clipboard.writeText(reportText).then(()=>{const b=document.getElementById('copyBtn');b.textContent='복사됨!';b.classList.add('copied');setTimeout(()=>{b.textContent='보고문구 복사';b.classList.remove('copied');},2000);});}
function openReportModal(){document.getElementById('reportTextarea').value=reportText;document.getElementById('reportModal').classList.remove('hidden');}
function closeReportModal(){document.getElementById('reportModal').classList.add('hidden');}
function saveReport(){reportText=document.getElementById('reportTextarea').value;saveData('reportText',reportText);closeReportModal();showToast('보고문구가 저장되었습니다');}

// CALENDAR
function calChangeMonth(d){calendarMonth.setMonth(calendarMonth.getMonth()+d);renderCalendar();}
function renderCalendar(){
  const y=calendarMonth.getFullYear(),m=calendarMonth.getMonth();
  document.getElementById('calMonthLabel').textContent=`${y}년 ${m+1}월`;
  document.getElementById('calDayHeaders').innerHTML=['일','월','화','수','목','금','토'].map((d,i)=>`<div class="cal-day-header ${i===0?'sun':i===6?'sat':'weekday'}">${d}</div>`).join('');
  const firstDay=new Date(y,m,1).getDay(),daysInMonth=new Date(y,m+1,0).getDate(),today=new Date();
  let cells=Array(firstDay).fill('');for(let i=1;i<=daysInMonth;i++)cells.push(i);
  document.getElementById('calGrid').innerHTML=cells.map((d,i)=>{
    if(!d)return`<div class="cal-cell" style="background:var(--bg)"></div>`;
    const key=`${y}-${String(m+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
    const rec=records[key],dow=i%7,isToday=d===today.getDate()&&m===today.getMonth()&&y===today.getFullYear();
    const nc=dow===0?'sun':dow===6?'sat':isToday?'today':'';
    const dots=rec?`<div class="cal-dots">${rec.sin>0?'<div class="cal-dot cal-dot-green"></div>':''}${(rec.haeng||[]).length?'<div class="cal-dot cal-dot-pink"></div>':''}${(rec.hak||[]).length?'<div class="cal-dot cal-dot-blue"></div>':''}</div>`:'';
    return`<div class="cal-cell${isToday?' today':''}" onclick="calSelectDay(${y},${m},${d})"><span class="cal-cell-num ${nc}">${d}</span>${dots}</div>`;
  }).join('');
}
function calSelectDay(y,m,d){
  const key=`${y}-${String(m+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`,rec=records[key];
  const det=document.getElementById('calDetail');det.style.display='block';
  document.getElementById('calDetailDate').textContent=`${y}년 ${m+1}월 ${d}일 (${DAYS[new Date(y,m,d).getDay()]})`;
  if(!rec){document.getElementById('calDetailContent').innerHTML=`<div style="color:var(--text3);font-size:13px">기록이 없습니다</div>`;return;}
  document.getElementById('calDetailContent').innerHTML=`
    ${rec.sin?`<div style="margin-bottom:6px"><span class="record-badge badge-green">창제</span> <span style="font-size:12px">${formatTime(rec.sin)}</span></div>`:''}
    ${(rec.haeng||[]).length?`<div style="margin-bottom:6px"><span class="record-badge badge-pink">활동</span> <span style="font-size:12px">${rec.haeng.map(h=>escHtml(h.name)).join(', ')}</span></div>`:''}
    ${(rec.hak||[]).length?`<div style="margin-bottom:6px"><span class="record-badge badge-blue">연찬</span> <span style="font-size:12px">${rec.hak.map(h=>escHtml(h.bookName)).join(', ')}</span></div>`:''}
    ${rec.resolution?`<div style="margin-bottom:6px"><span class="record-badge badge-teal">결의</span> <span style="font-size:12px">${escHtml(rec.resolution)}</span></div>`:''}`;
}

// FOREST
function updateForestFromRecords(){const s=new Date(chartConfig.startDate),e=new Date(chartConfig.endDate);let m=0;Object.entries(records).forEach(([k,r])=>{const d=new Date(k);if(d>=s&&d<=e)m+=r.sin||0;});chartConfig.completedMinutes=m;saveData('chartConfig',chartConfig);}
function renderForest(){
  const fmt=d=>{const dt=new Date(d);return`${dt.getFullYear()}.${String(dt.getMonth()+1).padStart(2,'0')}.${String(dt.getDate()).padStart(2,'0')}`;};
  document.getElementById('forestPeriodLabel').textContent=`${fmt(chartConfig.startDate)} ~ ${fmt(chartConfig.endDate)}`;
  const s=new Date(chartConfig.startDate),e=new Date(chartConfig.endDate);
  let totalMin=0,actCnt=0,meetCnt=0,totalPages=0;
  const bMap={},esMap={};
  Object.entries(records).forEach(([k,r])=>{
    const d=new Date(k);if(d<s||d>e)return;
    totalMin+=r.sin||0;
    (r.haeng||[]).forEach(h=>{const c=haengTypeToCategory(h.type);if(c==='활동')actCnt++;else if(c==='회합')meetCnt++;});
    (r.hak||[]).forEach(h=>{const p=Math.max(0,(+h.endPage||0)-(+h.startPage||0)+1);totalPages+=p;const map=h.bookType==='도서'?bMap:esMap;if(!map[h.bookName])map[h.bookName]={records:[]};map[h.bookName].records.push({date:k,startPage:h.startPage,endPage:h.endPage,pages:p});});
  });
  const compMin=Object.keys(records).length?totalMin:chartConfig.completedMinutes;
  document.getElementById('statHours').textContent=Math.floor(compMin/60)+'h';
  document.getElementById('statActivity').textContent=actCnt||156;
  document.getElementById('statMeeting').textContent=meetCnt||23;
  document.getElementById('statPages').textContent=(totalPages||1284)+'p';
  if(!messages.length)messages=['꾸준함이 기적을 만들어요! 🌱'];
  document.getElementById('marqueeText').textContent=messages[Math.floor(Date.now()/24000)%messages.length];
  const goalMin=chartConfig.goalMinutes,doneMin=compMin,pct=Math.min(100,Math.round(doneMin/goalMin*100));
  document.getElementById('forestBadge').textContent=pct+'% 달성';
  document.getElementById('forestPrayer').textContent=`"${chartConfig.prayer}"`;
  const cMin=30,tCells=Math.ceil(goalMin/cMin),rows=Math.ceil(tCells/14),aCells=rows*14,filledCells=Math.floor(doneMin/cMin);
  const gc=(i,tot)=>{const r=i/Math.max(tot,1);if(r<1/6)return'cell-0';if(r<2/6)return'cell-1';if(r<3/6)return'cell-2';if(r<4/6)return'cell-3';if(r<5/6)return'cell-4';return'cell-5';};
  let ch='';for(let i=0;i<aCells;i++)ch+=`<div class="chart-cell ${i<filledCells?gc(i,filledCells):'cell-unfilled'}"></div>`;
  document.getElementById('forestChart').innerHTML=ch;
  document.getElementById('treeCount').textContent=filledCells;
  const dH=Math.floor(doneMin/60),dM=doneMin%60;
  document.getElementById('forestDone').textContent=`${dH}시간${dM?` ${dM}분`:''}`;
  document.getElementById('forestGoal').textContent=Math.floor(goalMin/60)+'시간';
  document.getElementById('forestProgressBar').style.width=pct+'%';
  const ac=actCnt||156;document.getElementById('activityCountLabel').textContent=ac+'회';
  document.getElementById('activityHearts').innerHTML=Array.from({length:ac},()=>`<div class="heart-cell">💗</div>`).join('');
  const mc=meetCnt||23;document.getElementById('meetingCountLabel').textContent=mc+'회';
  document.getElementById('meetingHandshakes').innerHTML=Array.from({length:mc},()=>`<div class="handshake-cell">🤝</div>`).join('');
  // FIX6 books
  const books=Object.entries(bMap);
  const bTotP=books.reduce((s,[,d])=>s+d.records.reduce((ss,r)=>ss+Math.max(0,(+r.endPage||0)-(+r.startPage||0)+1),0),0);
  document.getElementById('bookCount').textContent=`총 ${(bTotP||1284).toLocaleString()}p`;
  document.getElementById('bookList').innerHTML=books.length?books.map(([n,d])=>{const p=d.records.reduce((s,r)=>s+Math.max(0,(+r.endPage||0)-(+r.startPage||0)+1),0);return`<span class="book-tag">${escHtml(n)} <span class="book-tag-p">${p}p</span></span>`;}).join(''): [{n:'21세기를 여는 대화',p:93},{n:'법화경의 지혜',p:245},{n:'새 인간혁명',p:312},{n:'신 인간혁명',p:198},{n:'인간혁명',p:156},{n:'청춘대화',p:89},{n:'행복의 꽃다발',p:124},{n:'희망의 대화',p:67}].map(b=>`<span class="book-tag">${b.n} <span class="book-tag-p">${b.p}p</span></span>`).join('');
  // FIX6 essays
  const essays=Object.entries(esMap);
  document.getElementById('essayCount').textContent=`총 ${essays.length||12}편`;
  document.getElementById('essayList').innerHTML=essays.length?essays.map(([n,d])=>{const p=d.records.reduce((s,r)=>s+Math.max(0,(+r.endPage||0)-(+r.startPage||0)+1),0);return`<span class="essay-tag">${escHtml(n)} <span class="essay-tag-p">${p}p</span></span>`;}).join(''): [{n:'가을을 장식하는 환희의 대행진',p:12},{n:'나와 함께 전진하는 동지에게',p:8},{n:'대백련화의 청년들이여',p:15},{n:'민중승리의 태양을 떠올려라',p:10},{n:'봄을 여는 사자후',p:11},{n:'비상하라 희망의 연대여',p:9},{n:'승리의 미래를 향해',p:14},{n:'위대한 사명의 궤도로',p:7},{n:'인간혁명의 대서사시를',p:16},{n:'전진 또 전진의 행진을',p:6},{n:'창가의 대정신을 계승하라',p:13},{n:'희망의 새벽을 여는 투사',p:11}].map(e=>`<span class="essay-tag">${e.n} <span class="essay-tag-p">${e.p}p</span></span>`).join('');
}
// CHART MODAL
function openChartModal(){document.getElementById('chartStart').value=chartConfig.startDate;document.getElementById('chartEnd').value=chartConfig.endDate;document.getElementById('chartGoalHours').value=Math.floor(chartConfig.goalMinutes/60);document.getElementById('chartPrayer').value=chartConfig.prayer;document.getElementById('chartModal').classList.remove('hidden');}
function closeChartModal(){document.getElementById('chartModal').classList.add('hidden');}

// MSG MODAL
function openMsgModal(){tempMessages=[...messages];renderMsgList();document.getElementById('msgModal').classList.remove('hidden');}
function closeMsgModal(){document.getElementById('msgModal').classList.add('hidden');}

function initApp(){updateDateDisplay();collectionMonth=new Date();calendarMonth=new Date();renderFilterPills();}
try{firebase.auth().onAuthStateChanged(u=>{if(u){currentUser=u;onLoginSuccess();}});}catch(e){}
