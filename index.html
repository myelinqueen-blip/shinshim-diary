<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>선민의 신심 일기</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;600;700;800;900&display=swap" rel="stylesheet"/>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0;border:none;font-family:'Noto Sans KR',sans-serif;}
:root{
  --g:#5BAD80;--g2:#4a9a6e;--gl:#EAF6EF;
  --bl:#7CB9E8;--bll:#EAF4FF;
  --pk:#F48FB1;--pkl:#FFF0F5;
  --pu:#A78BFA;--pul:#F3EEFF;
  --te:#4DB6AC;--tel:#E0F7F5;
  --ye:#FFD166;--yel:#FFFBEC;
  --or:#FF9F43;--orl:#FFF4EC;
  --tx:#1E2A38;--tx2:#52687A;--tx3:#A0B0BE;
  --bg:#F4F6F9;--sf:#fff;--bd:#E8ECF2;
  --r:14px;--rs:9px;
}
body{background:var(--bg);color:var(--tx);min-height:100vh;font-size:13px;}
button{cursor:pointer;background:none;font-family:inherit;border:none;}
input,select,textarea{font-family:inherit;}
input:focus,select:focus,textarea:focus{outline:none;}
input[type=number]::-webkit-inner-spin-button{-webkit-appearance:none;}
::-webkit-scrollbar{width:0;height:0;}
#app{max-width:390px;margin:0 auto;min-height:100vh;background:var(--bg);}

/* HEADER */
#hdr{
  background:linear-gradient(135deg,var(--g),var(--bl));
  padding:10px 14px;display:flex;align-items:center;justify-content:space-between;
  position:sticky;top:0;z-index:200;box-shadow:0 2px 10px rgba(91,173,128,.25);
}
.logo{display:flex;align-items:center;gap:8px;}
.logo-txt{font-size:16px;font-weight:900;color:#fff;}
.hbtns{display:flex;align-items:center;gap:8px;}
#gbtn{
  display:flex;align-items:center;justify-content:center;background:#fff;border-radius:50%;
  width:30px;height:30px;
  box-shadow:0 2px 8px rgba(0,0,0,.15);
}
#gbtn img{width:16px;height:16px;}
#uinfo{display:none;align-items:center;gap:6px;}
#uphoto{width:30px;height:30px;border-radius:50%;border:2px solid rgba(255,255,255,.6);}
#lout{font-size:17px;background:none;color:#fff;padding:0 2px;}
#scbtn{font-size:17px;background:none;color:#fff;padding:0 2px;}

/* TABBAR */
#tabbar{
  display:flex;height:44px;background:var(--sf);
  border-bottom:1.5px solid var(--bd);position:sticky;top:54px;z-index:100;
}
.tbtn{
  flex:1;height:100%;font-size:12px;font-weight:600;color:var(--tx3);
  background:none;border-bottom:2.5px solid transparent;
  display:flex;align-items:center;justify-content:center;
  transition:color .2s,border-color .2s;
}
.tbtn.on{color:var(--g);border-bottom-color:var(--g);font-weight:800;}

/* TABS */
.tcon{display:none;padding-bottom:80px;}
.tcon.on{display:block;}

/* DATE NAV */
#dnav{
  position:sticky;top:98px;z-index:50;
  display:flex;align-items:center;gap:8px;height:52px;padding:0 12px;
  background:var(--sf);border-bottom:1px solid var(--bd);
}
.arr{
  width:38px;height:38px;border-radius:10px;
  border:1.5px solid var(--bd);background:var(--sf);
  display:flex;align-items:center;justify-content:center;
  color:var(--tx2);font-size:20px;flex-shrink:0;
}
#ddisplay{
  flex:1;display:flex;flex-direction:column;align-items:center;
  cursor:pointer;user-select:none;
}
#dyear{font-size:10px;color:var(--tx3);}
#dmain{font-size:17px;font-weight:900;color:var(--tx);}
#tbtn{
  height:34px;border-radius:var(--rs);background:var(--g);
  padding:0 14px;font-size:12px;font-weight:700;color:#fff;flex-shrink:0;
}

/* CARD */
.card{margin:8px 12px 0;border-radius:var(--r);border:1px solid var(--bd);background:var(--sf);}
.chdr{
  display:flex;align-items:center;gap:9px;padding:10px 12px;
  border-bottom:1px solid var(--bd);border-top:3px solid transparent;
  border-radius:var(--r) var(--r) 0 0;
}
.chdr.cg{border-top-color:var(--g);}
.chdr.cp{border-top-color:var(--pk);}
.chdr.cb{border-top-color:var(--bl);}
.chdr.cpu{border-top-color:var(--pu);}
.chdr.ct{border-top-color:var(--te);}
.chdr.co{border-top-color:var(--or);}
.cic{
  width:28px;height:28px;border-radius:7px;
  display:flex;align-items:center;justify-content:center;
  font-size:14px;font-weight:900;color:#fff;flex-shrink:0;
}
.cic.cg{background:linear-gradient(135deg,var(--g),var(--g2));}
.cic.cp{background:linear-gradient(135deg,var(--pk),#e07898);}
.cic.cb{background:linear-gradient(135deg,var(--bl),#5a9cd0);}
.cic.cpu{background:linear-gradient(135deg,var(--pu),#8060d8);}
.cic.ct{background:linear-gradient(135deg,var(--te),#329a90);}
.cic.co{background:linear-gradient(135deg,var(--or),#e07820);}
.ctit{font-size:13px;font-weight:800;color:var(--tx);}
.cright{margin-left:auto;display:flex;align-items:center;gap:5px;}
.cbdy{padding:12px;}

/* INPUTS */
.inp{
  height:34px;border-radius:var(--rs);
  border:1.5px solid var(--bd);background:var(--bg);
  padding:0 9px;font-size:13px;color:var(--tx);
}
.inp:focus{border-color:var(--g);}
.sel{
  height:34px;border-radius:var(--rs);
  border:1.5px solid var(--bd);background:var(--bg);
  padding:0 7px;font-size:12px;color:var(--tx);
  appearance:none;-webkit-appearance:none;
}
.sel:focus{border-color:var(--g);}
.ta{
  width:100%;min-height:70px;resize:vertical;
  border-radius:var(--rs);border:1.5px solid var(--bd);
  background:var(--bg);padding:8px 10px;font-size:13px;
  color:var(--tx);line-height:1.6;
}
.ta:focus{border-color:var(--g);}

/* DND */
.drow{border-top:2.5px solid transparent;transition:opacity .15s;}
.drow.dragging{opacity:.4;}
.drow.dragover{border-top-color:var(--g);}
.grip{
  width:14px;flex-shrink:0;cursor:grab;
  display:flex;align-items:center;justify-content:center;
  color:var(--bd);
}

/* BUTTONS */
.delbtn{width:16px;height:16px;flex-shrink:0;font-size:11px;color:var(--tx3);display:flex;align-items:center;justify-content:center;border-radius:50%;}
.addbtn{font-size:11px;font-weight:600;color:var(--g);margin-top:6px;display:block;}
.smbtn{height:26px;border-radius:var(--rs);border:1.5px solid var(--bd);background:var(--sf);padding:0 10px;font-size:11px;font-weight:600;color:var(--tx2);}
.icbtn{width:26px;height:26px;border-radius:8px;border:1.5px solid var(--bd);background:var(--sf);display:flex;align-items:center;justify-content:center;font-size:12px;color:var(--tx2);}

/* PROGRESS */
.ptrack{height:5px;background:var(--bd);border-radius:6px;overflow:hidden;margin-top:10px;}
.pfill{height:100%;border-radius:6px;transition:width .4s;}
.plbls{display:flex;justify-content:space-between;font-size:11px;color:var(--tx3);margin-top:3px;}

/* SAVE BTN */
#savebtn{
  position:fixed;bottom:18px;left:50%;transform:translateX(-50%);
  border-radius:24px;background:var(--g);
  padding:13px 40px;font-size:14px;font-weight:800;color:#fff;
  box-shadow:0 4px 20px rgba(91,173,128,.35);
  transition:all .2s;white-space:nowrap;z-index:60;display:none;
}

/* 2DEPTH DROP */
.tdw{position:relative;flex:1;min-width:0;}
.tdb{
  height:34px;width:100%;border-radius:var(--rs);
  border:1.5px solid var(--bd);background:var(--bg);
  padding:0 24px 0 8px;font-size:12px;text-align:left;
  color:var(--tx);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;
  position:relative;
}
.tdb::after{content:"▼";position:absolute;right:7px;top:50%;transform:translateY(-50%);font-size:9px;color:var(--tx3);pointer-events:none;}
#tdrop-ov{position:fixed;inset:0;z-index:498;display:none;}
#tdrop-menu{
  position:fixed;z-index:499;background:var(--sf);
  border:1px solid var(--bd);border-radius:var(--r);
  box-shadow:0 8px 24px rgba(0,0,0,.14);
  width:190px;max-height:280px;overflow-y:auto;display:none;
}
.tgrp{padding:5px 12px 3px;font-size:10px;font-weight:800;color:var(--tx3);background:var(--bg);border-bottom:1px solid var(--bd);position:sticky;top:0;}
.titm{display:block;width:100%;padding:8px 14px;font-size:12px;text-align:left;background:none;color:var(--tx);border-bottom:1px solid rgba(232,236,242,.4);cursor:pointer;}
.titm:hover,.titm.on{background:var(--gl);color:var(--g);font-weight:600;}

/* CAL POPUP */
#cal-ov{position:fixed;inset:0;z-index:498;display:none;}
#cal-pop{
  position:fixed;z-index:499;background:var(--sf);
  border:1px solid var(--bd);border-radius:var(--r);
  box-shadow:0 8px 26px rgba(0,0,0,.15);padding:14px;width:252px;display:none;
}
.calhdr{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px;}
.calnav{width:28px;height:28px;border-radius:8px;border:1px solid var(--bd);background:var(--sf);display:flex;align-items:center;justify-content:center;font-size:16px;color:var(--tx2);}
.calgrid{display:grid;grid-template-columns:repeat(7,1fr);gap:2px;}
.calday{aspect-ratio:1;border-radius:6px;font-size:11px;font-weight:600;border:none;cursor:pointer;background:none;color:var(--tx);display:flex;align-items:center;justify-content:center;}
.calday:hover{background:var(--gl);}
.calday.sel{background:var(--g);color:#fff;}
.calday.tod{background:var(--gl);color:var(--g);}

/* COLLECTION */
.mnav{
  position:sticky;top:98px;z-index:50;
  display:flex;align-items:center;justify-content:space-between;
  height:48px;padding:0 12px;background:var(--sf);border-bottom:1px solid var(--bd);
}
.fpills{display:flex;gap:5px;overflow-x:auto;padding:8px 12px;scrollbar-width:none;}
.fp{flex-shrink:0;border-radius:99px;padding:5px 12px;font-size:11px;font-weight:600;cursor:pointer;transition:all .2s;}
.tag{font-size:10px;font-weight:600;border-radius:4px;padding:2px 6px;flex-shrink:0;}

/* SPEECH */
.spbox{border-radius:var(--rs);border:1px solid var(--bd);background:var(--sf);padding:10px 12px;margin-bottom:6px;}
.spbox.done{background:#F6F6F8;opacity:.65;}
.spbox.chk{border-color:var(--pu);}
.ftag{font-size:10px;font-weight:600;border-radius:99px;padding:2px 8px;border:1px solid var(--gl);background:var(--gl);color:var(--g);cursor:pointer;}

/* MEMBER */
.mbadge{font-size:10px;border-radius:4px;padding:2px 6px;background:var(--gl);color:var(--g);font-weight:600;}
.pbtn{height:28px;border-radius:99px;padding:0 12px;font-size:11px;font-weight:600;color:var(--tx2);border:1.5px solid var(--bd);background:var(--sf);}
.pbtn.on{border-color:var(--te);background:var(--tel);color:var(--te);}

/* CAL TAB */
.cg2{display:grid;grid-template-columns:repeat(7,1fr);gap:1px;background:var(--bd);}
.cc{background:var(--sf);aspect-ratio:1;display:flex;flex-direction:column;align-items:center;padding:4px;cursor:pointer;}
.cc:hover{background:var(--gl);}
.cc.csel{background:var(--gl);}
.cc.ctod{box-shadow:inset 0 0 0 2px var(--g);}
.cdot{width:5px;height:5px;border-radius:50%;}

/* FOREST */
.marqwrap{background:linear-gradient(to right,var(--g),var(--bl));padding:12px 16px;display:flex;align-items:center;gap:8px;overflow:hidden;}
.marqinner{flex:1;height:20px;overflow:hidden;position:relative;}
@keyframes marqscroll{from{transform:translateX(0)}to{transform:translateX(-50%)}}
.marqtxt{white-space:nowrap;font-size:13px;font-weight:600;color:#fff;display:inline-block;}
.sgrid{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin:8px 12px 0;}
.scell{border-radius:10px;padding:10px 4px;text-align:center;}
.wchart{border-radius:var(--r);border:1px solid var(--bd);background:var(--sf);padding:12px;margin:12px 12px 0;}
.eviz{border-radius:var(--r);border:1px solid var(--bd);padding:12px;}
.erow{display:flex;line-height:1.2;}
.bcard{border-radius:var(--r);border:1px solid var(--bd);background:var(--sf);padding:12px;}
@keyframes bounce{0%,100%{transform:translateY(0)}50%{transform:translateY(-6px)}}
.bounce{animation:bounce 1.4s ease-in-out infinite;display:inline-block;}

/* MODAL */
.mo{position:fixed;inset:0;z-index:300;display:flex;align-items:center;justify-content:center;background:rgba(0,0,0,.5);padding:16px;}
.mb{width:100%;max-width:360px;max-height:88vh;overflow-y:auto;border-radius:var(--r);background:var(--sf);padding:20px;}
.mtit{font-size:15px;font-weight:800;color:var(--tx);margin-bottom:14px;display:flex;align-items:center;justify-content:space-between;}
.mlbl{font-size:12px;font-weight:600;color:var(--tx2);display:block;margin-bottom:5px;}
.minp{width:100%;border-radius:var(--rs);border:1.5px solid var(--bd);background:var(--bg);padding:8px 12px;font-size:13px;color:var(--tx);margin-bottom:12px;}
.minp:focus{border-color:var(--g);}
.mfoot{display:flex;gap:10px;margin-top:4px;}
.mcan{flex:1;border-radius:var(--rs);border:1.5px solid var(--bd);padding:10px 0;font-size:13px;font-weight:700;color:var(--tx2);background:var(--sf);}
.mok{flex:1;border-radius:var(--rs);background:var(--g);padding:10px 0;font-size:13px;font-weight:700;color:#fff;}

/* TOAST */
#toast{position:fixed;top:70px;left:50%;transform:translateX(-50%) translateY(-20px);background:var(--tx);color:#fff;border-radius:20px;padding:8px 18px;font-size:13px;font-weight:600;z-index:500;opacity:0;pointer-events:none;transition:all .3s;white-space:nowrap;}
#toast.show{opacity:1;transform:translateX(-50%) translateY(0);}
</style>
</head>
<body>
<div id="app">

<!-- HEADER -->
<div id="hdr">
  <div class="logo">
    <span class="logo-txt">선민의 신심 일기</span>
  </div>
  <div class="hbtns">
    <button id="gbtn" onclick="loginGoogle()" title="구글 로그인">
      <img src="https://www.google.com/favicon.ico" alt="G"/>
    </button>
    <div id="uinfo">
      <img id="uphoto" src="" alt="" style="cursor:pointer;" onclick="showToast(document.getElementById('uname-data').textContent)"/>
      <span id="uname-data" style="display:none;"></span>
      <button id="lout" onclick="logoutUser()" title="로그아웃">🔓</button>
    </div>
    <button id="scbtn" onclick="saveCloud()" title="저장">⬇️</button>
  </div>
</div>

<!-- TABBAR -->
<nav id="tabbar">
  <button class="tbtn on" onclick="switchTab('record',this)">기록</button>
  <button class="tbtn" onclick="switchTab('collection',this)">모음</button>
  <button class="tbtn" onclick="switchTab('calendar',this)">캘린더</button>
  <button class="tbtn" onclick="switchTab('forest',this)">복운의 숲</button>
</nav>

<!-- RECORD TAB -->
<div id="tab-record" class="tcon on">
  <div id="dnav">
    <button class="arr" onclick="moveDate(-1)">‹</button>
    <div id="ddisplay" onclick="openDatePicker()">
      <span id="dyear"></span>
      <span id="dmain"></span>
    </div>
    <button class="arr" onclick="moveDate(1)">›</button>
    <button id="tbtn" onclick="goToday()">오늘</button>
  </div>

  <!-- 신 -->
  <div class="card">
    <div class="chdr cg">
      <div class="cic cg" style="font-size:13px;">신</div>
      <span class="ctit">창제</span>
      <div class="cright">
        <span id="sin-avg" style="font-size:10px;color:var(--tx3);"></span>
        <button class="smbtn" onclick="openGoalModal('sin')">목표설정</button>
      </div>
    </div>
    <div class="cbdy">
      <div style="display:flex;align-items:center;gap:12px;margin-bottom:4px;">
        <input type="number" id="sin-min" class="inp" placeholder="0"
          style="width:88px;height:46px;font-size:22px;font-weight:900;text-align:center;"
          oninput="onSinChange()"/>
        <span style="font-size:13px;color:var(--tx);">분</span>
        <span style="font-size:13px;color:var(--tx2);">→</span>
        <span id="sin-fmt" style="font-size:26px;font-weight:900;color:var(--g);">0m</span>
      </div>
      <div style="font-size:11px;color:var(--tx3);margin-bottom:6px;">0분 / 목표 <span id="sin-glbl">90분</span></div>
      <div class="ptrack"><div id="sin-bar" class="pfill" style="background:var(--g);width:0%"></div></div>
      <div class="plbls"><span>0분</span><span id="sin-pct">0%</span></div>
    </div>
  </div>

  <!-- 행 -->
  <div class="card">
    <div class="chdr cp">
      <div class="cic cp" style="font-size:13px;">행</div>
      <span class="ctit">광포·격려</span>
      <div class="cright"><span style="font-size:11px;color:var(--tx3);">목표: <span id="haeng-glbl">10명</span></span></div>
    </div>
    <div class="cbdy">
      <div id="haeng-list"></div>
      <button class="addbtn" onclick="addHaeng()">+ 추가</button>
    </div>
  </div>

  <!-- 학 -->
  <div class="card">
    <div class="chdr cb">
      <div class="cic cb" style="font-size:13px;">학</div>
      <span class="ctit">연찬</span>
      <div class="cright"><span style="font-size:11px;color:var(--tx3);">목표: <span id="hak-glbl">300p</span></span></div>
    </div>
    <div class="cbdy">
      <div id="hak-list"></div>
      <button class="addbtn" onclick="addHak()">+ 추가</button>
    </div>
  </div>

  <!-- 스피치 -->
  <div class="card">
    <div class="chdr cpu">
      <div class="cic cpu">💬</div>
      <span class="ctit">한 줄 스피치</span>
    </div>
    <div class="cbdy">
      <div id="speech-list"></div>
      <button class="addbtn" onclick="addSpeech()">+ 추가</button>
    </div>
  </div>

  <!-- 결의 -->
  <div class="card">
    <div class="chdr cpu">
      <div class="cic cpu">🔥</div>
      <span class="ctit">결의</span>
    </div>
    <div class="cbdy">
      <textarea class="ta" id="reso-inp" placeholder="오늘의 결의를 기록해주세요..." oninput="autoSave()"></textarea>
    </div>
  </div>

  <!-- 멤버 -->
  <div class="card">
    <div class="chdr ct">
      <div class="cic ct">🌸</div>
      <span class="ctit">멤버 상황</span>
    </div>
    <div class="cbdy">
      <div id="member-list"></div>
      <button class="addbtn" onclick="addMember()">+ 추가</button>
    </div>
  </div>

  <!-- 활동 -->
  <div class="card" style="margin-bottom:8px;">
    <div class="chdr co">
      <div class="cic co">📅</div>
      <span class="ctit">활동 일정</span>
      <div class="cright"><button class="smbtn" onclick="copyActivity()">복사</button></div>
    </div>
    <div class="cbdy">
      <div id="activity-list"></div>
      <button class="addbtn" onclick="addActivity()">+ 추가</button>
    </div>
  </div>
</div>

<!-- COLLECTION TAB -->
<div id="tab-collection" class="tcon">
  <div class="mnav" id="col-mnav">
    <div style="display:flex;align-items:center;gap:5px;">
      <button class="arr" style="width:32px;height:32px;" onclick="moveMonth(-1)">‹</button>
      <span id="col-mlbl" style="font-size:13px;font-weight:700;color:var(--tx);"></span>
      <button class="arr" style="width:32px;height:32px;" onclick="moveMonth(1)">›</button>
    </div>
    <div style="display:flex;gap:5px;align-items:center;">
      <button id="rpt-copy-btn" onclick="copyReport()" style="height:30px;border-radius:8px;border:1.5px solid var(--pu);background:var(--sf);padding:0 10px;font-size:11px;font-weight:700;color:var(--pu);">보고문구 복사</button>
      <button class="icbtn" onclick="openReportEdit()" title="보고문구 수정">✏️</button>
    </div>
  </div>
  <div style="padding:6px 12px;position:relative;">
    <span style="position:absolute;left:20px;top:50%;transform:translateY(-50%);color:var(--tx3);font-size:13px;">🔍</span>
    <input type="text" class="inp" id="col-search" placeholder="검색..." style="width:100%;padding-left:30px;" oninput="renderCol()"/>
  </div>
  <div class="fpills" id="fpills"></div>

  <!-- speech toolbar -->
  <div id="sp-toolbar" style="display:none;padding:0 12px 8px;">

var HAENG_GROUPS = [

  { header: '회합', items: [{ v: '좌담회', l: '좌담회' }, { v: '좌담회 참석간부', l: '좌담회 참석간부' }, { v: '협의', l: '협의' }, { v: '창제회', l: '창제회' }] }
];
var ACT_GROUPS = [

  { header: '회합', items: [{ v: '좌담회', l: '좌담회' }, { v: '창제회', l: '창제회' }, { v: '협의', l: '협의' }] }
];

// ====== FIREBASE ======
function initFirebase() {
  var cfg = {
  apiKey: "AIzaSyAvtgUROy9sqe4mnjcb3HV4TzRQ6bXsCQA",
  authDomain: "shinshim-diary.firebaseapp.com",

  };

function loginGoogle() {
  if (!db) { showToast('Firebase 설정이 필요합니다'); return; }
  var p = new firebase.auth.GoogleAuthProvider();
  p.setCustomParameters({ prompt: 'select_account' });
  firebase.auth().signInWithPopup(p).catch(function(e) {
    if (e.code === 'auth/popup-blocked' || e.code === 'auth/popup-closed-by-user') {
      firebase.auth().signInWithRedirect(p);
    } else {
      showToast('로그인 오류: ' + e.message);
    }
  });
}

function logoutUser() {
  if (firebase.auth) firebase.auth().signOut().then(function() { showToast('로그아웃'); });
}

// Firebase 경로: users/{uid}/entries, books, chanjeSettings, shinGoal
function baseRef() { return db.ref('users/' + curUser.uid); }

function saveCloud() {
  if (!curUser || !db) { showToast('로그인 후 저장 가능'); return; }
  var base = baseRef();

  // entries: 기록탭 날짜별 전체 데이터
  base.child('entries').set(records)
    .catch(function(e) { console.log('entries error', e); });

  // books: 연찬 요약 집계 (bookType > bookName: totalPages)
  var booksData = {};
  Object.values(records).forEach(function(r) {
    (r.hak || []).forEach(function(h) {
      if (!h.bookName) return;
      var type = h.bookType || '도서';
      var pg = Math.max(0, (parseInt(h.endPage) || 0) - (parseInt(h.startPage) || 0) + 1);
      if (!booksData[type]) booksData[type] = {};
      var key = h.bookName.replace(/[.#$[\]\/]/g, '_');
      booksData[type][key] = (booksData[type][key] || 0) + pg;
    });
  });
  base.child('books').set(booksData)
    .catch(function(e) { console.log('books error', e); });

  // chanjeSettings: 복운의 숲 창제표 설정
  // 기존 구조(color1, color2, giwon, icon, mode) + 추가 필드 병합
  var chanjeData = {
    color1: '#00BFFF',
    color2: '',
    giwon: forestCfg.prayer || '',
    icon: '❤️',
    mode: 'icon',
    name: forestCfg.name || '당신',
    startDate: forestCfg.startDate || '',
    endDate: forestCfg.endDate || '',
    goalMin: forestCfg.goalMin || 6000,
    msgs: forestMsgs || []
  };
  base.child('chanjeSettings').set(chanjeData)
    .catch(function(e) { console.log('chanjeSettings error', e); });

  // shinGoal: 목표값 및 앱 설정
  var shinGoalData = {
    sinGoal: goals.sin || 90,
    haengGoal: goals.haeng || 10,
    hakGoal: goals.hak || 300,
    rptTemplate: rptTemplate || '',
    fixedPhrase: fixedPhrase || '',
    spFolders: spFolders || [],
    spDone: spDone || {},
    customHaengItems: customHaengItems || []
  };
  base.child('shinGoal').set(shinGoalData)
    .then(function() { showToast('☁️ 저장 완료'); })
    .catch(function(e) { showToast('저장 오류: ' + e.message); });
}

function loadCloud() {
  if (!curUser || !db) return;
  showToast('☁️ 불러오는 중...');
  baseRef().once('value').then(function(snap) {
    var data = snap.val();
    if (!data) { showToast('저장된 데이터가 없습니다'); return; }

    // entries → records (기록탭 날짜별 데이터)
    if (data.entries) {
      records = data.entries;
    }

    // chanjeSettings → forestCfg & forestMsgs
    if (data.chanjeSettings) {
      var cs = data.chanjeSettings;
      if (cs.giwon !== undefined) forestCfg.prayer = cs.giwon;
      if (cs.name) forestCfg.name = cs.name;
      if (cs.startDate) forestCfg.startDate = cs.startDate;
      if (cs.endDate) forestCfg.endDate = cs.endDate;
      if (cs.goalMin) forestCfg.goalMin = cs.goalMin;
      if (cs.msgs && Array.isArray(cs.msgs) && cs.msgs.length) forestMsgs = cs.msgs;
    }

    // shinGoal → goals, rptTemplate, fixedPhrase, spFolders, spDone
    if (data.shinGoal) {
      var sg = data.shinGoal;
      if (sg.sinGoal) goals.sin = sg.sinGoal;
      if (sg.haengGoal) goals.haeng = sg.haengGoal;
      if (sg.hakGoal) goals.hak = sg.hakGoal;
      if (sg.rptTemplate) rptTemplate = sg.rptTemplate;
      if (sg.fixedPhrase) fixedPhrase = sg.fixedPhrase;
      if (sg.spFolders) spFolders = sg.spFolders;
      if (sg.spDone) spDone = sg.spDone;
      if (sg.customHaengItems) { customHaengItems = sg.customHaengItems; rebuildHaengGroups(); }
    if (sg.customHaengItems) { customHaengItems = sg.customHaengItems; rebuildHaengGroups(); }
    }

    // books는 entries에서 재집계되므로 별도 복원 불필요

    saveLocal();
    renderAll();
    showToast('☁️ 데이터를 불러왔습니다');
  }).catch(function(e) {
    showToast('불러오기 오류: ' + e.message);
  });
}

// ====== UTILS ======
function pad(n) { return String(n).padStart(2, '0'); }
function dk(d) { return d.getFullYear() + '-' + pad(d.getMonth() + 1) + '-' + pad(d.getDate()); }
function getT(h) { return h.type === '직접입력' ? (h.custom || '') : (h.type || ''); }
function uid() { return Math.random().toString(36).slice(2) + Date.now(); }

function getRec(k) {
  if (!records[k]) records[k] = { sinMin: '', haeng: [], hak: [], speech: [], reso: '', members: [], activity: [] };
  return records[k];
}

function ensureDef(k) {
  var r = getRec(k);
  if (!r.haeng.length) r.haeng = [{ id: uid(), name: '', type: '대화', custom: '' }];
  if (!r.hak.length) r.hak = [{ id: uid(), bookType: '도서', bookName: '', startPage: '', endPage: '' }];
  if (!r.speech.length) r.speech = [{ id: uid(), text: '' }];
  if (!r.members.length) r.members = [{ id: uid(), name: '', memo: '' }];
  if (!r.activity.length) r.activity = [{ id: uid(), date: '', name: '', type: '', custom: '', companion: '' }];
}

function showToast(msg) {
  var t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(function() { t.classList.remove('show'); }, 2200);
}

function fmtMin(n) {
  n = parseInt(n) || 0;
  var h = Math.floor(n / 60), m = n % 60;
  if (h === 0) return m + 'm';
  if (m === 0) return h + 'h';
  return h + 'h ' + m + 'm';
}

function fmtFull(s) {
  var d = new Date(s);
  return (d.getMonth() + 1) + '월 ' + d.getDate() + '일 (' + DAYS[d.getDay()] + ')';
}

function fmtShort(s) {
  var d = new Date(s);
  return (d.getMonth() + 1) + '/' + d.getDate();
}

function closeM(id) { document.getElementById(id).style.display = 'none'; }

function saveLocal() {
  try {
    localStorage.setItem('sd4', JSON.stringify({
      records: records, goals: goals, forestCfg: forestCfg,
      forestMsgs: forestMsgs, rptTemplate: rptTemplate,
      fixedPhrase: fixedPhrase, spFolders: spFolders, spDone: spDone,
      customHaengItems: customHaengItems
    }));
  } catch (e) {}
}

function loadLocal() {
  try {
    var s = localStorage.getItem('sd4');
    if (!s) return;
    var d = JSON.parse(s);
    if (d.records) records = d.records;
    if (d.goals) goals = d.goals;
    if (d.forestCfg) forestCfg = d.forestCfg;
    if (d.forestMsgs) forestMsgs = d.forestMsgs;
    if (d.rptTemplate) rptTemplate = d.rptTemplate;
    if (d.fixedPhrase) fixedPhrase = d.fixedPhrase;
    if (d.spFolders) spFolders = d.spFolders;
    if (d.spDone) d.spDone && (spDone = d.spDone);
  } catch (e) {}
}

function openCalPop(val, cb, rect) {

function renderCalPop() {
  var y = calPopCur.getFullYear(), mo = calPopCur.getMonth();
  document.getElementById('cal-pop-m').textContent = y + '년 ' + (mo + 1) + '월';
  var hdr = document.getElementById('cal-pop-hdr');
  hdr.innerHTML = '';
  DAYS.forEach(function(d, i) {
    var div = document.createElement('div');
    div.style.cssText = 'text-align:center;font-size:10px;font-weight:600;padding:2px 0;color:' + (i === 0 ? 'var(--pk)' : i === 6 ? 'var(--bl)' : 'var(--tx3)') + ';';
    div.textContent = d;
    hdr.appendChild(div);
  });
  var grid = document.getElementById('cal-pop-grid');
  grid.innerHTML = '';
  var first = new Date(y, mo, 1), last = new Date(y, mo + 1, 0);
  for (var i = 0; i < first.getDay(); i++) grid.appendChild(document.createElement('div'));
  var today = new Date();
  for (var d = 1; d <= last.getDate(); d++) {
    var s = y + '-' + pad(mo + 1) + '-' + pad(d);
    var btn = document.createElement('button');
    btn.className = 'calday';
    btn.textContent = d;
    var dow = (first.getDay() + d - 1) % 7;
    if (dow === 0) btn.style.color = 'var(--pk)';
    else if (dow === 6) btn.style.color = 'var(--bl)';
    if (d === today.getDate() && mo === today.getMonth() && y === today.getFullYear()) btn.classList.add('tod');
    if (s === calPopVal) btn.classList.add('sel');
    (function(sv) {
      btn.onclick = function(e) { e.stopPropagation(); if (calPopCB) calPopCB(sv); closeCalPop(); };
    })(s);
    grid.appendChild(btn);
  }
}

// ====== DND ======
var dragSrc = null, dragField2 = null;

function setupDrag(row, field) {
  row.ondragstart = function(e) {
    dragSrc = row; dragField2 = field;
    e.dataTransfer.effectAllowed = 'move';
    row.classList.add('dragging');
  };
  row.ondragend = function() {
    row.classList.remove('dragging');
    document.querySelectorAll('.drow').forEach(function(r) { r.classList.remove('dragover'); });
  };
  row.ondragover = function(e) {
    e.preventDefault();
    if (dragField2 === field && dragSrc !== row) row.classList.add('dragover');
  };
  row.ondragleave = function() { row.classList.remove('dragover'); };
  row.ondrop = function(e) {
    e.preventDefault();
    row.classList.remove('dragover');
    if (dragField2 !== field || !dragSrc || dragSrc === row) return;
    var k = dk(curDate), arr = getRec(k)[field] || [];
    var si = parseInt(dragSrc.dataset.idx), ti = parseInt(row.dataset.idx);
    var item = arr.splice(si, 1)[0];
    arr.splice(ti, 0, item);
    refreshField(field, arr);
    autoSave();
  };
}

function refreshField(field, arr) {
  if (field === 'haeng') renderHaengList(arr);
  else if (field === 'hak') renderHakList(arr);
  else if (field === 'speech') renderSpeechRecList(arr);
  else if (field === 'members') renderMemberList(arr);
  else if (field === 'activity') renderActList(arr);
}

var FPILLS = [
  { id: 'all', label: '전체', c: '--g', lt: '--gl' },
  { id: 'sin', label: '신', c: '--g', lt: '--gl' },
  { id: 'haeng', label: '행', c: '--pk', lt: '--pkl' },
  { id: 'hak', label: '학', c: '--bl', lt: '--bll' },
  { id: 'member', label: '멤버', c: '--te', lt: '--tel' },
  { id: 'speech', label: '스피치', c: '--pu', lt: '--pul' },
  { id: 'resolution', label: '결의', c: '--pu', lt: '--pul' }
];

function renderFPills() {
  var el = document.getElementById('fpills');
  el.innerHTML = '';
  FPILLS.forEach(function(p) {
    var btn = document.createElement('button');
    btn.className = 'fp';
    btn.textContent = p.label;
    var on = colFilter === p.id;
    btn.style.background = on ? 'var(' + p.c + ')' : 'var(' + p.lt + ')';
    btn.style.color = on ? '#fff' : 'var(' + p.c + ')';
    btn.onclick = (function(id) { return function() { colFilter = id; renderCol(); }; })(p.id);
    el.appendChild(btn);
  });
}

function getMonthRecs() {
  var y = colMonth.y, m = colMonth.m;
  var q = document.getElementById('col-search').value.toLowerCase();
  return Object.entries(records).map(function(e) { return Object.assign({}, e[1], { date: e[0] }); }).filter(function(r) {
    var d = new Date(r.date);
    if (d.getFullYear() !== y || d.getMonth() + 1 !== m) return false;
    if (!q) return true;
    return (r.haeng || []).some(function(h) { return h.name.toLowerCase().includes(q); }) ||
      (r.hak || []).some(function(h) { return h.bookName.toLowerCase().includes(q); }) ||
      (r.speech || []).some(function(s) { return s.text.toLowerCase().includes(q); }) ||
      (r.reso && r.reso.toLowerCase().includes(q)) ||
      (r.members || []).some(function(m) { return m.name.toLowerCase().includes(q); });
  }).sort(function(a, b) { return b.date.localeCompare(a.date); });
}

function renderCol() {
  renderFPills();
  var isSp = colFilter === 'speech', isMem = colFilter === 'member';
  document.getElementById('col-mnav').style.display = isSp ? 'none' : 'flex';
  document.getElementById('sp-toolbar').style.display = isSp ? 'block' : 'none';
  document.getElementById('mem-period-bar').style.display = isMem ? 'block' : 'none';
  document.getElementById('col-mlbl').textContent = colMonth.y + '년 ' + colMonth.m + '월';

  var cont = document.getElementById('col-content');
  cont.innerHTML = '';

  if (colFilter === 'all') renderAllTab(cont, getMonthRecs());
  else if (colFilter === 'sin') renderSinTab(cont, getMonthRecs());
  else if (colFilter === 'haeng') renderHaengTab(cont, getMonthRecs());
  else if (colFilter === 'hak') renderHakTab(cont, getMonthRecs());
  else if (colFilter === 'member') renderMemTab(cont);
  else if (colFilter === 'speech') renderSpTab(cont);
  else if (colFilter === 'resolution') renderResoTab(cont, getMonthRecs());
}

function moveMonth(d) {
  var y = colMonth.y, m = colMonth.m + d;
  if (m > 12) { m = 1; y++; } if (m < 1) { m = 12; y--; }
  colMonth = { y: y, m: m }; renderCol();
}

// ALL TAB - 신/행/학/결의/멤버만, ✨ 형식 복사

    if (r.reso) copyTxt += '▪️결의 : ' + r.reso + '\n';
    if (mem.length) copyTxt += '▪️멤버 : ' + mem.map(function(m) { return m.name + (m.memo ? '(' + m.memo + ')' : ''); }).join(', ') + '\n';
    copyTxt = copyTxt.trim();

    card.style.cssText = 'border-radius:var(--r);border:1px solid var(--bd);background:var(--sf);padding:13px;';
    var hdr = document.createElement('div');
    hdr.style.cssText = 'display:flex;justify-content:space-between;align-items:center;margin-bottom:9px;';
    var dtl = document.createElement('span');

      r.reso && ['purple', '결의', r.reso],

// SIN TAB - 꺾은선 그래프
function renderSinTab(cont, recs) {
  if (!recs.length) { cont.innerHTML = '<div style="text-align:center;padding:36px;color:var(--tx3);">기록 없음</div>'; return; }
  var data = recs.slice().reverse().map(function(r) { return { date: r.date, min: parseInt(r.sinMin || 0) }; });
  var sd = new Date(forestCfg.startDate), ed = new Date(forestCfg.endDate);
  var totalDays = Math.max(1, Math.round((ed - sd) / (1000 * 60 * 60 * 24)));
  var dailyGoal = Math.round(forestCfg.goalMin / totalDays);
  var maxMin = Math.max.apply(null, data.map(function(d) { return d.min; }).concat([dailyGoal, 1]));
  var curAvg = data.length ? Math.round(data.reduce(function(s, d) { return s + d.min; }, 0) / data.length) : 0;
  var pm = { y: colMonth.m === 1 ? colMonth.y - 1 : colMonth.y, m: colMonth.m === 1 ? 12 : colMonth.m - 1 };
  var prevRecs = Object.entries(records).filter(function(e) { var d = new Date(e[0]); return d.getFullYear() === pm.y && d.getMonth() + 1 === pm.m; });
  var prevAvg = prevRecs.length ? Math.round(prevRecs.reduce(function(s, e) { return s + (parseInt(e[1].sinMin || 0)); }, 0) / prevRecs.length) : 0;
  var diff = curAvg - prevAvg;

  // 주간 합산
  var weeks = {};
  data.forEach(function(d) {
    var dt = new Date(d.date), ws = new Date(dt);
    ws.setDate(dt.getDate() - dt.getDay());
    var wk = dk(ws);
    if (!weeks[wk]) weeks[wk] = 0;
    weeks[wk] += d.min;
  });
  var weekArr = Object.entries(weeks).sort(function(a, b) { return a[0].localeCompare(b[0]); });

  var card = document.createElement('div');
  card.style.cssText = 'border-radius:var(--r);border:1px solid var(--bd);background:var(--sf);padding:14px;';
  var W = 300, H = 90;
  var pts = data.map(function(d, i) {
    var x = data.length > 1 ? i / (data.length - 1) * (W - 20) + 10 : W / 2;
    var y = H - 4 - (d.min / maxMin) * (H - 8);
    return { x: x, y: y, min: d.min, date: d.date };
  });
  var goalY = H - 4 - (dailyGoal / maxMin) * (H - 8);
  var pathD = pts.length > 1 ? 'M' + pts.map(function(p) { return p.x.toFixed(1) + ',' + p.y.toFixed(1); }).join(' L') : (pts.length === 1 ? 'M' + pts[0].x + ',' + pts[0].y : '');
  var areaD = pts.length > 1 ? pathD + ' L' + pts[pts.length - 1].x + ',' + H + ' L' + pts[0].x + ',' + H + ' Z' : '';

  card.innerHTML =
    '<div style="font-size:12px;font-weight:700;color:var(--tx);margin-bottom:4px;">📊 일일 창제 시간</div>' +
    '<div style="font-size:11px;color:var(--tx3);margin-bottom:8px;">' +
    '평균 <strong style="color:var(--g);">' + curAvg + '분</strong>' +
    '&nbsp;<span style="color:' + (diff >= 0 ? 'var(--g)' : 'var(--pk)') + '">전월 대비 ' + (diff >= 0 ? '+' : '') + diff + '분</span>' +
    '&nbsp;|&nbsp;일일목표 ' + dailyGoal + '분</div>' +
    '<div style="border-radius:8px;overflow:hidden;background:var(--gl);padding:8px;">' +
    '<svg id="sin-svg" viewBox="0 0 ' + W + ' ' + H + '" width="100%" height="' + H + '" style="display:block;">' +
    '<line x1="0" y1="' + goalY.toFixed(1) + '" x2="' + W + '" y2="' + goalY.toFixed(1) + '" stroke="var(--g2)" stroke-width="1" stroke-dasharray="4,3" opacity="0.6"/>' +
    (areaD ? '<path d="' + areaD + '" fill="rgba(91,173,128,0.12)"/>' : '') +
    (pathD ? '<path d="' + pathD + '" fill="none" stroke="var(--g)" stroke-width="2" stroke-linejoin="round" stroke-linecap="round"/>' : '') +
    pts.map(function(p, i) {
      return '<circle cx="' + p.x.toFixed(1) + '" cy="' + p.y.toFixed(1) + '" r="4" fill="var(--sf)" stroke="var(--g)" stroke-width="2" style="cursor:pointer;" data-idx="' + i + '" onclick="showSinTip(' + i + ',' + p.min + ',\'' + p.date + '\',event)"/>';
    }).join('') +
    '</svg>' +
    '<div id="sin-tip" style="display:none;position:absolute;background:var(--tx);color:#fff;font-size:11px;font-weight:700;border-radius:6px;padding:2px 8px;pointer-events:none;white-space:nowrap;"></div>' +
    '</div>' +
    '<div style="margin-top:10px;"><div style="font-size:11px;font-weight:600;color:var(--tx3);margin-bottom:5px;">주간 합산</div>' +
    '<div style="display:flex;flex-wrap:wrap;gap:5px;">' +
    weekArr.map(function(e) {
      var wd = new Date(e[0]);
      return '<div style="border-radius:var(--rs);background:var(--gl);padding:4px 9px;font-size:11px;font-weight:600;color:var(--g);">' + (wd.getMonth() + 1) + '/' + wd.getDate() + '주 <strong>' + fmtMin(e[1]) + '</strong></div>';
    }).join('') +
    '</div></div>';

  cont.appendChild(card);
}

function showSinTip(idx, min, date, e) {
  var tip = document.getElementById('sin-tip');
  if (!tip) return;
  tip.textContent = fmtShort(date) + ' ' + fmtMin(min);
  var svg = document.getElementById('sin-svg');
  if (!svg) return;
  var r = svg.getBoundingClientRect();
  tip.style.left = Math.min(e.clientX - r.left + 4, r.width - 80) + 'px';
  tip.style.top = Math.max(e.clientY - r.top - 28, 0) + 'px';
  tip.style.display = 'block';
  setTimeout(function() { if (tip) tip.style.display = 'none'; }, 2500);
}

// HAENG TAB
function renderHaengTab(cont, recs) {
  if (!recs.length) { cont.innerHTML = '<div style="padding:32px;text-align:center;color:var(--tx3);">기록 없음</div>'; return; }
  var stats = {}, custom = {}, detail = {};
  ACT_TYPES.concat(MTG_TYPES).forEach(function(k) { stats[k] = 0; });
  recs.forEach(function(r) {
    (r.haeng || []).forEach(function(h) {
      var t = getT(h); if (!t || !h.name) return;
      if (stats[t] !== undefined) stats[t]++;
      else custom[t] = (custom[t] || 0) + 1;
      if (!detail[t]) detail[t] = [];
      detail[t].push({ date: r.date, name: h.name });
    });
  });

  var card = document.createElement('div');
  card.style.cssText = 'border-radius:var(--r);border:1px solid var(--bd);background:var(--sf);padding:12px;';
  card.innerHTML = '<div style="display:flex;align-items:center;margin-bottom:9px;gap:8px;"><span style="font-size:12px;font-weight:700;color:var(--tx);">🌸 활동</span><button onclick="openHaengItemEdit()" style="height:22px;border-radius:var(--rs);border:1.5px solid var(--pk);background:var(--pkl);padding:0 9px;font-size:10px;font-weight:600;color:var(--pk);">드롭다운 항목 추가</button></div><div id="haeng-grid" style="display:grid;grid-template-columns:repeat(3,1fr);gap:7px;"></div>';
  var grid = card.querySelector('#haeng-grid');
  var openType = null;

  function toggleDetail(type) {
    var existing = card.querySelector('.haeng-detail');
    if (existing) existing.remove();
    if (openType === type) { openType = null; return; }
    openType = type;
    var list = detail[type] || [];
    var det = document.createElement('div');
    det.className = 'haeng-detail';
    det.style.cssText = 'border-radius:var(--rs);border:1px solid var(--bd);background:var(--bg);padding:10px;margin-top:8px;';
    det.innerHTML = '<div style="font-size:12px;font-weight:700;color:var(--tx);margin-bottom:7px;">' + type + ' 기록</div>';
    list.slice().sort(function(a, b) { return b.date.localeCompare(a.date); }).forEach(function(x) {
      det.innerHTML += '<div style="display:flex;justify-content:space-between;padding:4px 0;border-bottom:1px solid var(--bd);font-size:12px;"><span style="color:var(--tx3);">' + fmtShort(x.date) + '</span><span style="color:var(--tx);">' + x.name + '</span></div>';
    });
    card.appendChild(det);
  }

  ACT_TYPES.concat(MTG_TYPES).forEach(function(type) {
    var b = document.createElement('div');
    b.style.cssText = 'border-radius:9px;padding:9px 6px;text-align:center;background:var(--pkl);cursor:pointer;';
    b.innerHTML = '<div style="font-size:17px;font-weight:700;color:var(--pk);">' + (stats[type] || 0) + '</div><div style="font-size:9px;color:var(--pk);margin-top:1px;">' + type + '</div>';
    b.onclick = (function(t) { return function() { toggleDetail(t); }; })(type);
    grid.appendChild(b);
  });
  Object.keys(custom).forEach(function(type) {
    var b = document.createElement('div');
    b.style.cssText = 'border-radius:9px;padding:9px 6px;text-align:center;background:var(--yel);cursor:pointer;';
    b.innerHTML = '<div style="font-size:17px;font-weight:700;color:#9a6e00;">' + custom[type] + '</div><div style="font-size:9px;color:#9a6e00;margin-top:1px;">' + type + '</div>';
    b.onclick = (function(t) { return function() { toggleDetail(t); }; })(type);
    grid.appendChild(b);
  });
  cont.appendChild(card);
}

// HAK TAB - 도서 상단, 어서 하단
function renderHakTab(cont, recs) {
  if (!recs.length) { cont.innerHTML = '<div style="padding:32px;text-align:center;color:var(--tx3);">기록 없음</div>'; return; }
  var bm = new Map();
  recs.forEach(function(r) {
    (r.hak || []).forEach(function(h) {
      if (!h.bookName) return;
      var k = h.bookType + '::' + h.bookName;
      var pg = Math.max(0, (parseInt(h.endPage) || 0) - (parseInt(h.startPage) || 0) + 1);
      if (!bm.has(k)) bm.set(k, { bookType: h.bookType, bookName: h.bookName, pages: 0, days: new Set() });
      bm.get(k).pages += pg; bm.get(k).days.add(r.date);
    });
  });
  var books = Array.from(bm.values()).filter(function(b) { return b.bookType === '도서'; }).sort(function(a, b) { return b.pages - a.pages; });
  var essays = Array.from(bm.values()).filter(function(b) { return b.bookType === '어서'; }).sort(function(a, b) { return b.pages - a.pages; });

  function makeSection(list, label, icon, color, bg) {
    if (!list.length) return;
    var sec = document.createElement('div');
    sec.style.cssText = 'border-radius:var(--r);border:1px solid var(--bd);background:var(--sf);padding:12px;';
    var totalP = list.reduce(function(s, b) { return s + b.pages; }, 0);
    sec.innerHTML = '<div style="display:flex;align-items:center;margin-bottom:9px;"><span style="font-size:13px;font-weight:800;color:var(--tx);flex:1;">' + icon + ' ' + label + '</span><span style="font-size:11px;color:var(--tx3);margin-right:8px;">' + list.length + (label === '도서' ? '권' : '편') + '</span><span style="font-size:14px;font-weight:900;color:' + color + ';">' + totalP.toLocaleString() + 'p</span></div>';
    list.forEach(function(b) {
      sec.innerHTML += '<div style="display:flex;align-items:center;justify-content:space-between;padding:5px 0;border-bottom:1px solid var(--bd);gap:6px;"><span style="font-size:12px;font-weight:600;color:var(--tx);flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;">' + b.bookName + '</span><span style="font-size:12px;font-weight:700;color:' + color + ';flex-shrink:0;">' + b.pages + 'p</span><span style="font-size:11px;color:var(--tx3);flex-shrink:0;">' + b.days.size + '일</span></div>';
    });
    cont.appendChild(sec);
  }
  makeSection(books, '도서', '📚', 'var(--bl)', 'var(--bll)');
  makeSection(essays, '어서', '📄', 'var(--pu)', 'var(--pul)');
}

// MEMBER TAB
var memPeriodActive = 3, memPeriodCS = '', memPeriodCE = '';

function setMemPeriod(months, btn) {
  memPeriodActive = months; memPeriodCS = ''; memPeriodCE = '';
  document.querySelectorAll('.pbtn').forEach(function(b) { b.classList.remove('on'); });
  if (btn) btn.classList.add('on');
  renderCol();
}

function openMemPeriodCal() { document.getElementById('m-memperiod').style.display = 'flex'; }
function applyMemPeriodCal() {
  memPeriodCS = document.getElementById('m-mp-sd').value;
  memPeriodCE = document.getElementById('m-mp-ed').value;
  if (memPeriodCS || memPeriodCE) memPeriodActive = -1;
  closeM('m-memperiod'); renderCol();
}

function getMemRecs() {
  var now = new Date();
  return Object.entries(records).map(function(e) { return Object.assign({}, e[1], { date: e[0] }); }).filter(function(r) {
    var d = new Date(r.date);
    if (memPeriodActive === -1) {
      if (memPeriodCS && d < new Date(memPeriodCS)) return false;
      if (memPeriodCE && d > new Date(memPeriodCE)) return false;
      return true;
    }
    if (memPeriodActive === 0) return true;
    var cutoff = new Date(now); cutoff.setMonth(cutoff.getMonth() - memPeriodActive);
    return d >= cutoff;
  });
}

function renderMemTab(cont) {
  var allRecs = getMemRecs();
  var mp = new Map();
  allRecs.forEach(function(r) {
    (r.haeng || []).forEach(function(h) {
      if (!h.name) return;
      var t = getT(h);
      if (!mp.has(h.name)) mp.set(h.name, { contacts: {}, lastDate: '', memos: [] });
      var m = mp.get(h.name);
      m.contacts[t] = (m.contacts[t] || 0) + 1;
      if (!m.lastDate || r.date > m.lastDate) m.lastDate = r.date;
    });
    (r.members || []).forEach(function(m) {
      if (!m.name) return;
      if (!mp.has(m.name)) mp.set(m.name, { contacts: {}, lastDate: '', memos: [] });
      var mem = mp.get(m.name);
      if (m.memo) mem.memos.push({ date: r.date, memo: m.memo });
      if (!mem.lastDate || r.date > mem.lastDate) mem.lastDate = r.date;
    });
  });

  var sort = document.getElementById('mem-sort').value;
  var now = new Date();
  function totalCnt(e) { return Object.values(e[1].contacts).reduce(function(s, v) { return s + v; }, 0); }
  var sorted = Array.from(mp.entries());
  if (sort === 'abc') sorted.sort(function(a, b) { return a[0].localeCompare(b[0], 'ko'); });
  else if (sort === 'recent') sorted.sort(function(a, b) { return b[1].lastDate.localeCompare(a[1].lastDate) || a[0].localeCompare(b[0], 'ko'); });
  else if (sort === 'old') sorted.sort(function(a, b) { return a[1].lastDate.localeCompare(b[1].lastDate) || a[0].localeCompare(b[0], 'ko'); });
  else if (sort === 'most') sorted.sort(function(a, b) { return totalCnt(b) - totalCnt(a) || a[0].localeCompare(b[0], 'ko'); });
  else if (sort === 'least') sorted.sort(function(a, b) { return totalCnt(a) - totalCnt(b) || a[0].localeCompare(b[0], 'ko'); });

  // 알림 배너
  var allNames = new Set(mp.keys());
  var c2m = new Date(now); c2m.setMonth(c2m.getMonth() - 2);
  var c3m = new Date(now); c3m.setMonth(c3m.getMonth() - 3);
  var n3m = [], n2m = [];
  allNames.forEach(function(name) {
    var m = mp.get(name); var last = m.lastDate ? new Date(m.lastDate) : null;
    if (!last || last < c3m) n3m.push(name);
    else if (last < c2m) n2m.push(name);
  });
  if (n3m.length) {
    var b1 = document.createElement('div');
    b1.style.cssText = 'border-radius:var(--rs);background:var(--pkl);padding:9px 12px;font-size:11px;color:var(--pk);line-height:1.6;margin-bottom:5px;';
    b1.textContent = '만난지 3개월 이상 지난 ' + n3m.join(', ') + '과 반갑게 연락해보세요😄'; cont.appendChild(b1);
  }
  if (n2m.length) {
    var b2 = document.createElement('div');
    b2.style.cssText = 'border-radius:var(--rs);background:var(--yel);opacity:.9;padding:9px 12px;font-size:11px;color:#8a6800;line-height:1.6;margin-bottom:7px;';
    b2.textContent = '만난지 2개월 이상 지난 ' + n2m.join(', ') + '의 안부를 물어보세요😉'; cont.appendChild(b2);
  }

  if (!sorted.length) { cont.innerHTML += '<div style="padding:32px;text-align:center;color:var(--tx3);">기록 없음</div>'; return; }

  sorted.forEach(function(entry) {
    var name = entry[0], mem = entry[1];
    var last = mem.lastDate ? new Date(mem.lastDate) : null;
    var daysAgo = last ? Math.floor((now - last) / (1000 * 60 * 60 * 24)) : null;
    var contactTypes = Object.entries(mem.contacts).sort(function(a, b) { return b[1] - a[1]; });
    var badgeHtml = contactTypes.slice(0, 3).map(function(e) { return '<span class="mbadge">' + e[0] + ' ' + e[1] + '회</span>'; }).join(' ');

    var card = document.createElement('div');
    card.style.cssText = 'border-radius:var(--r);border:1px solid var(--bd);background:var(--sf);overflow:hidden;';
    var hdr = document.createElement('div');
    hdr.style.cssText = 'display:flex;align-items:center;justify-content:space-between;padding:11px 12px;cursor:pointer;';
    hdr.innerHTML =
      '<div style="flex:1;min-width:0;"><div style="display:flex;align-items:center;gap:8px;margin-bottom:3px;"><span style="font-size:13px;font-weight:700;color:var(--tx);">' + name + '</span>' +
      (daysAgo !== null ? '<span style="font-size:10px;color:var(--tx3);">최근 ' + daysAgo + '일 전</span>' : '') +
      '</div><div style="display:flex;flex-wrap:nowrap;gap:3px;overflow:hidden;">' + badgeHtml + '</div></div>';

    var body = document.createElement('div');
    body.style.cssText = 'display:none;border-top:1px solid var(--bd);background:var(--bg);padding:10px 12px;';
    body.innerHTML = '<div style="font-size:11px;font-weight:600;color:var(--tx3);margin-bottom:5px;">활동 내역</div>' +
      contactTypes.map(function(e) { return '<div style="display:flex;justify-content:space-between;padding:4px 0;font-size:12px;border-bottom:1px solid var(--bd);"><span style="color:var(--tx);">' + e[0] + '</span><span style="font-weight:700;color:var(--g);">' + e[1] + '회</span></div>'; }).join('') +
      (mem.memos.length ? '<div style="font-size:11px;font-weight:600;color:var(--tx3);margin:7px 0 4px;">메모</div>' + mem.memos.slice().sort(function(a, b) { return b.date.localeCompare(a.date); }).map(function(m) { return '<div style="display:flex;gap:8px;padding:3px 0;font-size:11px;border-bottom:1px solid var(--bd);"><span style="color:var(--tx3);flex-shrink:0;">' + fmtShort(m.date) + '</span><span style="color:var(--tx);">' + m.memo + '</span></div>'; }).join('') : '');

    hdr.onclick = function() { body.style.display = body.style.display === 'none' ? 'block' : 'none'; };
    card.appendChild(hdr); card.appendChild(body); cont.appendChild(card);
  });
}

// SPEECH TAB
function getAllSpeech() {
  var items = [];
  Object.entries(records).forEach(function(e) {
    (e[1].speech || []).filter(function(s) { return s.text; }).forEach(function(s) { items.push(Object.assign({}, s, { date: e[0] })); });
  });
  return items.sort(function(a, b) { return b.date.localeCompare(a.date); });
}

function getSpFolder(id) { return spFolders.find(function(f) { return (f.speechIds || []).includes(id); }); }
function getSpFolderName(id) { var f = getSpFolder(id); return f ? f.name : ''; }

function renderSpTab(cont) {
  spChecked = {};
  updateBulkBar();
  var all = getAllSpeech();
  var q = document.getElementById('col-search').value.toLowerCase();
  var filtered = q ? all.filter(function(s) { return s.text.toLowerCase().includes(q); }) : all;
  var visible = filtered.filter(function(s) { return !spDone[s.id] && getSpFolderName(s.id) !== '숨김'; });
  var hidden = filtered.filter(function(s) { return spDone[s.id] || getSpFolderName(s.id) === '숨김'; });

  // 폴더별
  var nonHiddenFolders = spFolders.filter(function(f) { return f.name !== '숨김'; });
  nonHiddenFolders.forEach(function(folder) {
    var items = visible.filter(function(s) { return (folder.speechIds || []).includes(s.id); });
    var hdr = document.createElement('div');
    hdr.style.cssText = 'display:flex;align-items:center;gap:7px;margin:8px 0 4px;';
    hdr.innerHTML = '<span style="font-size:13px;font-weight:700;color:var(--g);">📁 ' + folder.name + '</span><span style="font-size:11px;color:var(--tx3);">' + items.length + '개</span>';
    var delF = document.createElement('button');
    delF.style.cssText = 'font-size:11px;color:var(--tx3);margin-left:auto;';
    delF.textContent = '삭제';
    delF.onclick = (function(fid) { return function() { if (confirm('폴더를 삭제하시겠습니까?')) { spFolders = spFolders.filter(function(f) { return f.id !== fid; }); saveLocal(); renderCol(); } }; })(folder.id);
    hdr.appendChild(delF); cont.appendChild(hdr);
    items.forEach(function(s) { cont.appendChild(makeSpBox(s, false)); });
  });

  // 분류없음
  var noFolder = visible.filter(function(s) { return !getSpFolder(s.id); });
  if (noFolder.length) {
    var nh = document.createElement('div');
    nh.style.cssText = 'font-size:12px;font-weight:600;color:var(--tx3);margin:8px 0 4px;';
    nh.textContent = '분류없음';
    cont.appendChild(nh);
    noFolder.forEach(function(s) { cont.appendChild(makeSpBox(s, false)); });
  }

  // 숨김
  if (hidden.length) {
    var dhdr = document.createElement('div');
    dhdr.style.cssText = 'display:flex;align-items:center;gap:7px;margin:12px 0 4px;cursor:pointer;';
    dhdr.innerHTML = '<span style="font-size:12px;font-weight:700;color:var(--tx3);">숨김 (' + hidden.length + ')</span><span style="font-size:11px;color:var(--tx3);">▼</span>';
    var dbody = document.createElement('div');
    dbody.style.display = 'none';
    dhdr.onclick = function() { dbody.style.display = dbody.style.display === 'none' ? 'block' : 'none'; };
    cont.appendChild(dhdr); cont.appendChild(dbody);
    hidden.forEach(function(s) { dbody.appendChild(makeSpBox(s, true)); });
  }
  if (!filtered.length) cont.innerHTML = '<div style="padding:36px;text-align:center;color:var(--tx3);">스피치 기록이 없습니다</div>';
}

function makeSpBox(s, isHidden) {
  var box = document.createElement('div');
  box.className = 'spbox' + (isHidden ? ' done' : '') + (spChecked[s.id] ? ' chk' : '');
  box.dataset.id = s.id;
  var folderName = getSpFolderName(s.id) || '분류없음';

  var hdr = document.createElement('div');
  hdr.style.cssText = 'display:flex;align-items:center;gap:5px;margin-bottom:6px;';

  var chk = document.createElement('input');
  chk.type = 'checkbox'; chk.style.cssText = 'width:14px;height:14px;border-radius:4px;cursor:pointer;accent-color:var(--pu);flex-shrink:0;';
  chk.checked = !!spChecked[s.id];
  chk.onchange = (function(id) { return function() { if (chk.checked) spChecked[id] = true; else delete spChecked[id]; box.classList.toggle('chk', chk.checked); updateBulkBar(); }; })(s.id);

  var ftag = document.createElement('button');
  ftag.className = 'ftag';
  ftag.textContent = isHidden ? '숨김' : folderName;
  ftag.onclick = (function(id) { return function() { openFolderMove([id]); }; })(s.id);

  var btns = document.createElement('div');
  btns.style.cssText = 'display:flex;gap:4px;align-items:center;margin-left:auto;';

  var cpBtn = document.createElement('button');
  cpBtn.style.cssText = 'width:22px;height:22px;border-radius:5px;border:1px solid var(--bd);background:var(--sf);display:flex;align-items:center;justify-content:center;';
  cpBtn.innerHTML = '<svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>';
  cpBtn.onclick = (function(text) { return function() { navigator.clipboard.writeText(text).then(function() { showToast('📋 복사'); }); }; })(s.text);

  if (isHidden) {
    var rst = document.createElement('button');
    rst.style.cssText = 'height:22px;border-radius:var(--rs);border:1.5px solid var(--g);background:var(--gl);padding:0 7px;font-size:10px;font-weight:600;color:var(--g);';
    rst.textContent = '복구';
    rst.onclick = (function(id) { return function() { delete spDone[id]; saveLocal(); renderCol(); }; })(s.id);
    btns.appendChild(rst);
  } else {
    var doneBtn = document.createElement('button');
    doneBtn.style.cssText = 'width:22px;height:22px;border-radius:5px;border:1px solid var(--bd);background:var(--sf);display:flex;align-items:center;justify-content:center;font-size:12px;';
    doneBtn.textContent = '✔️';
    doneBtn.onclick = (function(id) { return function() { spDone[id] = true; saveLocal(); renderCol(); }; })(s.id);
    btns.appendChild(doneBtn);
  }
  btns.appendChild(cpBtn);
  hdr.appendChild(chk); hdr.appendChild(ftag); hdr.appendChild(btns);

  var txt = document.createElement('div');
  txt.style.cssText = 'font-size:13px;color:var(--tx);line-height:1.5;';
  txt.textContent = s.text;
  box.appendChild(hdr); box.appendChild(txt);
  return box;
}

function updateBulkBar() {
  var cnt = Object.keys(spChecked).length;
  var bar = document.getElementById('bulk-bar');
  if (bar) { bar.style.display = cnt > 0 ? 'flex' : 'none'; var cc = document.getElementById('chk-cnt'); if (cc) cc.textContent = cnt + '개 선택'; }
}

function bulkMoveFolder() { if (!Object.keys(spChecked).length) return; openFolderMove(Object.keys(spChecked)); }
function bulkCopy() {
  var all = getAllSpeech().filter(function(s) { return spChecked[s.id]; });
  navigator.clipboard.writeText(all.map(function(s) { return s.text; }).join('\n')).then(function() { showToast('📋 일괄 복사'); });
}
function bulkDone() { Object.keys(spChecked).forEach(function(id) { spDone[id] = true; }); spChecked = {}; saveLocal(); renderCol(); }

function openFolderMove(ids) {
  var list = document.getElementById('m-fmove-list'); list.innerHTML = '';
  var none = document.createElement('button');
  none.style.cssText = 'display:block;width:100%;padding:10px 14px;text-align:left;border-radius:var(--rs);border:1px solid var(--bd);background:var(--bg);font-size:13px;color:var(--tx);margin-bottom:5px;';
  none.textContent = '📌 분류없음 (폴더 제거)';
  none.onclick = function() {
    ids.forEach(function(id) { spFolders.forEach(function(f) { if (f.speechIds) { var i = f.speechIds.indexOf(id); if (i > -1) f.speechIds.splice(i, 1); } }); });
    saveLocal(); closeM('m-folder-move'); renderCol();
  };
  list.appendChild(none);
  spFolders.forEach(function(folder) {
    var b = document.createElement('button');
    b.style.cssText = 'display:block;width:100%;padding:10px 14px;text-align:left;border-radius:var(--rs);border:1px solid var(--bd);background:var(--sf);font-size:13px;color:var(--tx);margin-bottom:5px;';
    b.textContent = '📁 ' + folder.name;
    b.onclick = (function(f) {
      return function() {
        ids.forEach(function(id) {
          spFolders.forEach(function(ff) { if (ff.speechIds) { var i = ff.speechIds.indexOf(id); if (i > -1) ff.speechIds.splice(i, 1); } });
          if (!f.speechIds) f.speechIds = [];
          if (!f.speechIds.includes(id)) f.speechIds.push(id);
          if (f.name === '숨김') spDone[id] = true;
        });
        saveLocal(); closeM('m-folder-move'); renderCol();
      };
    })(folder);
    list.appendChild(b);
  });
  document.getElementById('m-folder-move').style.display = 'flex';
}

function addSpFolder() { document.getElementById('m-folder-inp').value = ''; document.getElementById('m-folder-name').style.display = 'flex'; }
function confirmFolder() {
  var name = document.getElementById('m-folder-inp').value.trim();
  if (name) { spFolders.push({ id: uid(), name: name, speechIds: [] }); saveLocal(); closeM('m-folder-name'); renderCol(); }
}

// REPORT
function copyReport() {
  var y = colMonth.y, m = colMonth.m;
  var recs = Object.entries(records).map(function(e) { return Object.assign({}, e[1], { date: e[0] }); })
    .filter(function(r) { var d = new Date(r.date); return d.getFullYear() === y && d.getMonth() + 1 === m; })
    .sort(function(a, b) { return a.date.localeCompare(b.date); });
  var txt = rptTemplate + '\n\n' + recs.map(function(r) {
    var t = fmtFull(r.date) + '\n▪️신 : ' + parseInt(r.sinMin || 0) + '분';
    var h = (r.haeng || []).filter(function(x) { return x.name; });
    if (h.length) t += '\n▪️행 : ' + h.map(function(x) { return x.name + ' ' + getT(x); }).join(', ');
    var k2 = (r.hak || []).filter(function(x) { return x.bookName; });
    if (k2.length) t += '\n▪️학 : ' + k2.map(function(x) { return x.bookName + ' (' + x.startPage + '~' + x.endPage + 'p)'; }).join(', ');
    var s = (r.speech || []).filter(function(x) { return x.text; });
    if (s.length) t += '\n▪️스피치 : ' + s.map(function(x) { return x.text; }).join(' / ');
    if (r.reso) t += '\n▪️결의 : ' + r.reso;
    return t;
  }).join('\n\n');
  navigator.clipboard.writeText(txt).then(function() {
    var btn = document.getElementById('rpt-copy-btn');
    btn.textContent = '복사 완료!'; btn.style.background = 'var(--pu)'; btn.style.color = '#fff';
    setTimeout(function() { btn.textContent = '보고문구 복사'; btn.style.background = 'var(--sf)'; btn.style.color = 'var(--pu)'; }, 2500);
  });
}

function openReportEdit() { document.getElementById('m-rpt-ta').value = rptTemplate; document.getElementById('m-rpt-edit').style.display = 'flex'; }
function saveRptEdit() { rptTemplate = document.getElementById('m-rpt-ta').value; saveLocal(); closeM('m-rpt-edit'); showToast('저장됨'); }

// ====== CALENDAR ======
function renderCal() {
  var y = calMonth.getFullYear(), mo = calMonth.getMonth();
  document.getElementById('cal-mlbl').textContent = y + '년 ' + (mo + 1) + '월';
  var hdrs = document.getElementById('cal-dayhdrs'); hdrs.innerHTML = '';
  DAYS.forEach(function(d, i) {
    var div = document.createElement('div');
    div.style.cssText = 'padding:8px 0;text-align:center;font-size:11px;font-weight:600;color:' + (i === 0 ? 'var(--pk)' : i === 6 ? 'var(--bl)' : 'var(--tx3)') + ';';
    div.textContent = d; hdrs.appendChild(div);
  });
  var grid = document.getElementById('cal-grid'); grid.innerHTML = '';
  var first = new Date(y, mo, 1), last = new Date(y, mo + 1, 0);
  for (var i = 0; i < first.getDay(); i++) { var e = document.createElement('div'); e.style.cssText = 'background:var(--sf);aspect-ratio:1;'; grid.appendChild(e); }
  var today = new Date();
  for (var d = 1; d <= last.getDate(); d++) {
    var k = y + '-' + pad(mo + 1) + '-' + pad(d), rec = records[k];
    var cell = document.createElement('button'); cell.className = 'cc';
    var dow = (first.getDay() + d - 1) % 7;
    if (d === today.getDate() && mo === today.getMonth() && y === today.getFullYear()) cell.classList.add('ctod');
    if (calSelDate === k) cell.classList.add('csel');
    var ns = document.createElement('span');
    ns.style.cssText = 'font-size:12px;font-weight:600;color:' + (d === today.getDate() && mo === today.getMonth() && y === today.getFullYear() ? 'var(--g)' : dow === 0 ? 'var(--pk)' : dow === 6 ? 'var(--bl)' : 'var(--tx)') + ';';
    ns.textContent = d; cell.appendChild(ns);
    if (rec) {
      var hasDot = parseInt(rec.sinMin || 0) > 0 || (rec.haeng || []).some(function(h) { return h.name; }) || (rec.hak || []).some(function(h) { return h.bookName; });
      if (hasDot) {
        var dr = document.createElement('div'); dr.style.cssText = 'display:flex;gap:2px;margin-top:2px;';
        if (parseInt(rec.sinMin || 0) > 0) { var dot = document.createElement('div'); dot.className = 'cdot'; dot.style.background = 'var(--g)'; dr.appendChild(dot); }
        if ((rec.haeng || []).some(function(h) { return h.name; })) { var dot2 = document.createElement('div'); dot2.className = 'cdot'; dot2.style.background = 'var(--pk)'; dr.appendChild(dot2); }
        if ((rec.hak || []).some(function(h) { return h.bookName; })) { var dot3 = document.createElement('div'); dot3.className = 'cdot'; dot3.style.background = 'var(--bl)'; dr.appendChild(dot3); }
        cell.appendChild(dr);
      }
    }
    cell.onclick = (function(kk) { return function() { calSelDate = kk; renderCal(); showCalDetail(kk); }; })(k);
    grid.appendChild(cell);
  }
}

function moveCalMonth(d) { calMonth = new Date(calMonth.getFullYear(), calMonth.getMonth() + d, 1); renderCal(); }

function showCalDetail(k) {
  var rec = records[k], det = document.getElementById('cal-detail');
  det.style.display = 'block';
  var date = new Date(k);
  var html = '<div style="font-size:14px;font-weight:800;color:var(--tx);margin-bottom:9px;">' + (date.getMonth() + 1) + '월 ' + date.getDate() + '일</div>';
  if (!rec || (!parseInt(rec.sinMin || 0) && !(rec.haeng || []).some(function(h) { return h.name; }) && !(rec.hak || []).some(function(h) { return h.bookName; }))) {
    html += '<p style="text-align:center;font-size:13px;color:var(--tx3);">기록 없음</p>';
  } else {
    var sinN = parseInt(rec.sinMin || 0), hC = (rec.haeng || []).filter(function(h) { return h.name; }).length, hP = (rec.hak || []).reduce(function(s, h) { return s + Math.max(0, (parseInt(h.endPage) || 0) - (parseInt(h.startPage) || 0) + 1); }, 0);
    html += '<div style="display:flex;justify-content:space-around;">' + [[sinN > 0 ? fmtMin(sinN) : '–', '신·창제', 'var(--g)'], [hC + '명', '행·격려', 'var(--pk)'], [hP + 'p', '학·연찬', 'var(--bl)']].map(function(v) { return '<div style="text-align:center;"><div style="font-size:10px;color:var(--tx3);">' + v[1] + '</div><div style="font-size:18px;font-weight:900;color:' + v[2] + ';">' + v[0] + '</div></div>'; }).join('') + '</div>';
  }
  det.innerHTML = html;
}

// ====== FOREST ======
var marqPos = 0, marqFull = '', marqSpeed = 0.4;

function startMarquee() {
  if (marqRAF) cancelAnimationFrame(marqRAF);
  var inner = document.getElementById('marq-inner');
  var txt = document.getElementById('marq-txt');
  if (!inner || !txt) return;
  marqFull = forestMsgs.map(function(m) { return m.replace('당신', forestCfg.name); }).join('　　　　');
  txt.textContent = marqFull + '　　　　' + marqFull;
  marqPos = 0;

  function step() {
    marqPos += marqSpeed;
    var fullW = txt.scrollWidth / 2;
    if (marqPos >= fullW) marqPos -= fullW;
    txt.style.transform = 'translateX(-' + marqPos + 'px)';
    marqRAF = requestAnimationFrame(step);
  }
  marqRAF = requestAnimationFrame(step);
}

function renderForest() {
  startMarquee();
  var sd = new Date(forestCfg.startDate), ed = new Date(forestCfg.endDate);
  document.getElementById('forest-period').textContent = sd.getFullYear() + '.' + pad(sd.getMonth() + 1) + '.' + pad(sd.getDate()) + ' ~ ' + ed.getFullYear() + '.' + pad(ed.getMonth() + 1) + '.' + pad(ed.getDate());

  var sinTotal = 0, actCnt = 0, meetCnt = 0, pages = 0;
  Object.values(records).forEach(function(r) {
    sinTotal += parseInt(r.sinMin || 0);
    (r.haeng || []).forEach(function(h) {
      if (!h.name) return;
      var t = getT(h);
      if (ACT_TYPES.includes(t)) actCnt++;
      if (MTG_TYPES.includes(t)) meetCnt++;
    });
    (r.hak || []).forEach(function(h) { pages += Math.max(0, (parseInt(h.endPage) || 0) - (parseInt(h.startPage) || 0) + 1); });
  });

  // STATS: 창제시간, 격려활동, 회합참석, 연찬
  var sg = document.getElementById('stat-grid'); sg.innerHTML = '';
  [['🙏', Math.floor(sinTotal / 60) + 'h', '창제 시간', 'var(--gl)'], ['🌸', actCnt, '격려 활동', 'var(--pkl)'], ['✨', meetCnt, '회합 참석', '#FFFBEC'], ['📖', pages.toLocaleString() + 'p', '연찬', 'var(--bll)']].forEach(function(item) {
    var c = document.createElement('div'); c.className = 'scell'; c.style.background = item[3];
    c.innerHTML = '<div style="font-size:18px;">' + item[0] + '</div><div style="font-size:15px;font-weight:900;color:var(--tx);margin-top:2px;">' + item[1] + '</div><div style="font-size:9px;font-weight:600;color:var(--tx2);margin-top:1px;">' + item[2] + '</div>';
    sg.appendChild(c);
  });

  // WORD CHART (30분=1칸, 실제 입력 기반)
  var goalMin = forestCfg.goalMin || 6000;
  var totalCells = Math.ceil(goalMin / 30);
  var filledCells = Math.min(Math.floor(sinTotal / 30), totalCells);
  var pct = Math.round((filledCells / totalCells) * 100);
  var emoji = pct >= 66 ? '👑' : pct >= 33 ? '💍' : '💎';
  var colors = ['#87cefa', '#00bfff', '#1e90ff'];
  var wc = document.getElementById('word-chart');
  var prayerHtml = forestCfg.prayer ? '<div style="border-radius:var(--rs);background:linear-gradient(135deg,var(--gl),var(--bll));padding:9px 12px;font-size:11px;color:var(--g2);line-height:1.6;margin-bottom:9px;">' + forestCfg.prayer + '</div>' : '';
  wc.innerHTML = '<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:5px;"><span style="font-size:12px;font-weight:800;color:var(--tx);">🙏🏻 나의 창제표</span><span style="font-size:11px;color:var(--tx3);">' + filledCells + '/' + totalCells + '칸 (' + pct + '%)</span></div>' + prayerHtml + '<div style="display:grid;grid-template-columns:repeat(15,1fr);gap:2px;margin-bottom:9px;" id="wc-cells"></div><div style="display:flex;justify-content:center;align-items:center;gap:6px;"><span class="bounce" style="font-size:22px;">' + emoji + '</span><span style="font-size:10px;font-weight:700;color:var(--tx3);">' + fmtMin(sinTotal) + ' / ' + fmtMin(goalMin) + '</span></div>';
  var cells = document.getElementById('wc-cells');
  for (var i = 0; i < totalCells; i++) {
    var c2 = document.createElement('div');
    var filled = i < filledCells, ci = filled && filledCells > 0 ? Math.min(2, Math.floor((i / filledCells) * 3)) : 0;
    c2.style.cssText = 'aspect-ratio:1;border-radius:3px;background:' + (filled ? colors[ci] : 'var(--bg)') + ';border:' + (filled ? 'none' : '1px solid var(--bd)') + ';transition:all .3s;';
    cells.appendChild(c2);
  }

  // 기원문은 word-chart 내에 렌더됨
  var pe = document.getElementById('forest-prayer'); if(pe) pe.style.display = 'none';

  // EMOJI VIZ
  renderEViz('act-viz', actCnt, '🌸 격려 활동', 'var(--pk)', 'linear-gradient(135deg,var(--pkl) 80%,var(--gl) 40%)', 10, ['🌱', '🌳', '🌸']);
  renderEViz('meet-viz', meetCnt, '✨ 회합 참석', '#D4A017', 'linear-gradient(135deg,#FFFBEC,#FFF8D0)', 8, ['✨', '✨', '✨']);

  // BOOKS
  var bm = new Map();
  Object.values(records).forEach(function(r) {
    (r.hak || []).forEach(function(h) {
      if (!h.bookName) return;
      var k = h.bookType + '::' + h.bookName, pg = Math.max(0, (parseInt(h.endPage) || 0) - (parseInt(h.startPage) || 0) + 1);
      if (!bm.has(k)) bm.set(k, { bookType: h.bookType, bookName: h.bookName, pages: 0 });
      bm.get(k).pages += pg;
    });
  });
  var bw = document.getElementById('books-wrap'); bw.innerHTML = '';
  var bks = Array.from(bm.values()).filter(function(b) { return b.bookType === '도서'; });
  var ess = Array.from(bm.values()).filter(function(b) { return b.bookType === '어서'; });
  [[[bks, '도서', '📚', 'var(--bl)', 'var(--bll)'], [ess, '어서', '📄', 'var(--pu)', 'var(--pul)']]].forEach(function(pairs) {
    pairs.forEach(function(p) {
      var list = p[0], label = p[1], icon = p[2], color = p[3], bg = p[4];
      if (!list.length) return;
      var card = document.createElement('div'); card.className = 'bcard';
      var totalP = list.reduce(function(s, b) { return s + b.pages; }, 0);
      card.innerHTML = '<div style="display:flex;align-items:center;margin-bottom:9px;"><span style="font-size:12px;font-weight:800;color:var(--tx);flex:1;">' + icon + ' ' + label + '</span><span style="font-size:11px;color:var(--tx3);margin-right:7px;">' + list.length + (label === '도서' ? '권' : '편') + '</span><span style="font-size:14px;font-weight:900;color:' + color + ';">' + totalP.toLocaleString() + 'p</span></div><div style="display:flex;flex-wrap:wrap;gap:5px;">' + list.map(function(b) { return '<div style="background:' + bg + ';border-radius:99px;padding:4px 10px;display:inline-flex;gap:3px;align-items:center;"><span style="font-size:10px;color:var(--tx);">' + b.bookName + '</span><span style="font-size:9px;font-weight:700;color:' + color + ';">' + b.pages + 'p</span></div>'; }).join('') + '</div>';
      bw.appendChild(card);
    });
  });
}

function renderEViz(id, count, title, color, bg, COLS, emojis) {
  var el = document.getElementById(id);
  var rows = Math.ceil(count / COLS) || 0;
  var getE = function(ri) { return ri === 0 ? emojis[0] : ri <= 2 ? emojis[1] : emojis[2]; };
  el.innerHTML = '<div class="eviz" style="background:' + bg + ';"><div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:5px;"><span style="font-size:12px;font-weight:800;color:var(--tx);">' + title + '</span><span style="font-size:15px;font-weight:900;color:' + color + ';">' + count + '회</span></div><div style="font-size:10px;color:var(--tx3);text-align:center;margin-bottom:7px;">' + (emojis[0] === '🌱' ? '광포격려로 숲이 자라요' : '함께한 순간이 빛나요') + '</div><div style="background:rgba(255,255,255,.5);border-radius:8px;padding:8px;min-height:34px;" id="' + id + '-area"></div></div>';
  var area = document.getElementById(id + '-area');
  if (!count) { area.innerHTML = '<div style="text-align:center;padding:9px 0;font-size:12px;color:var(--tx3);">아직 기록 없음</div>'; return; }
  for (var r = 0; r < rows; r++) {
    var row = document.createElement('div'); row.className = 'erow';
    var cnt = Math.min(COLS, count - r * COLS);
    for (var c = 0; c < cnt; c++) { var sp = document.createElement('span'); sp.style.fontSize = '16px'; sp.textContent = getE(r); row.appendChild(sp); }
    area.appendChild(row);
  }
}

// Touch DnD support for mobile
function setupTouch(row, field) {
  var touchStartY = 0, dragging = false;
  row.addEventListener('touchstart', function(e) {
    touchStartY = e.touches[0].clientY;
    dragging = false;
  }, { passive: true });
  row.addEventListener('touchmove', function(e) {
    var dy = Math.abs(e.touches[0].clientY - touchStartY);
    if (dy > 8) {
      dragging = true;
      e.preventDefault();
      var touch = e.touches[0];
      var el = document.elementFromPoint(touch.clientX, touch.clientY);
      var target = el ? el.closest('.drow') : null;
      document.querySelectorAll('.drow').forEach(function(r) { r.classList.remove('dragover'); });
      if (target && target !== row) target.classList.add('dragover');
    }
  }, { passive: false });
  row.addEventListener('touchend', function(e) {
    if (!dragging) return;
    document.querySelectorAll('.drow').forEach(function(r) { r.classList.remove('dragover'); });
    var touch = e.changedTouches[0];
    var el = document.elementFromPoint(touch.clientX, touch.clientY);
    var target = el ? el.closest('.drow') : null;
    if (!target || target === row) return;
    var k = dk(curDate), arr = getRec(k)[field] || [];
    var si = parseInt(row.dataset.idx), ti = parseInt(target.dataset.idx);
    if (isNaN(si) || isNaN(ti) || si === ti) return;
    var item = arr.splice(si, 1)[0];
    arr.splice(ti, 0, item);
    refreshField(field, arr);
    autoSave();
  });
}

  HAENG_GROUPS = [
    { header: '활동', items: [{ v: '대화', l: '대화' }, { v: '통화', l: '통화' }, { v: '연락', l: '연락' }, { v: '근행회', l: '근행회' }, { v: '칸나', l: '칸나' }] },
    { header: '회합', items: [{ v: '좌담회', l: '좌담회' }, { v: '좌담회 참석간부', l: '좌담회 참석간부' }, { v: '협의', l: '협의' }, { v: '창제회', l: '창제회' }] }
  ];
  if (customHaengItems.length > 0) {
    HAENG_GROUPS.push({ header: '사용자 추가', items: customHaengItems.map(function(v) { return { v: v, l: v }; }) });
  }
  ACT_GROUPS = [
    { header: '활동', items: [{ v: '대화', l: '대화' }, { v: '연락', l: '연락' }, { v: '칸나', l: '칸나' }] },
    { header: '회합', items: [{ v: '좌담회', l: '좌담회' }, { v: '창제회', l: '창제회' }, { v: '협의', l: '협의' }] }
  ];
  if (customHaengItems.length > 0) {
    ACT_GROUPS.push({ header: '사용자 추가', items: customHaengItems.map(function(v) { return { v: v, l: v }; }) });
  }
}

function renderHaengItemsList() {
  var el = document.getElementById('haeng-items-list');
  el.innerHTML = '';

    el.innerHTML = '<div style="text-align:center;padding:12px;font-size:12px;color:var(--tx3);">추가된 항목이 없습니다</div>';
    return;
  }
  customHaengItems.forEach(function(item, i) {
    var row = document.createElement('div');
    row.style.cssText = 'display:flex;align-items:center;gap:8px;padding:7px 10px;border-radius:var(--rs);background:var(--bg);';

}

function addHaengItem() {
  var v = document.getElementById('haeng-new-inp').value.trim();

  if (customHaengItems.indexOf(v) > -1) { showToast('이미 있는 항목입니다'); return; }

  rebuildHaengGroups();
  saveLocal();
  document.getElementById('haeng-new-inp').value = '';
  renderHaengItemsList();
  showToast('✅ 추가됨: ' + v);
}
