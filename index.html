<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>신심 일기 – 복운의 숲</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;600;700;900&display=swap" rel="stylesheet" />
<style>
  /* ─── 색상 변수 ─────────────────────────────── */
  :root {
    --green:   #5BAD80;
    --green2:  #4a9a6e;
    --green3:  #3a8a5e;
    --green-l: #EAF6EF;
    --pink:    #F48FB1;
    --pink-l:  #FFF0F5;
    --pink2:   #e87da4;
    --yellow:  #FFD166;
    --text:    #1E2A38;
    --text2:   #52687A;
    --text3:   #A0B0BE;
    --bg:      #F4F6F9;
    --surface: #FFFFFF;
    --border:  #E8ECF2;

    /* 창제표 그린 그라데이션 5단계 */
    --g0: #c8e6c9; /* 가장 연함 – 초기 */
    --g1: #81c784;
    --g2: #4caf50;
    --g3: #388e3c;
    --g4: #1b5e20; /* 가장 진함 – 완료 */
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Noto Sans KR', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    padding-bottom: 40px;
  }

  /* ─── 앱 래퍼 ────────────────────────────────── */
  .app-wrap {
    max-width: 420px;
    margin: 0 auto;
    padding: 0;
  }

  /* ─── 전광판 ─────────────────────────────────── */
  .marquee-bar {
    background: linear-gradient(90deg, var(--green), var(--green2));
    padding: 10px 14px;
    display: flex;
    align-items: center;
    gap: 8px;
    overflow: hidden;
  }
  .marquee-inner { flex: 1; overflow: hidden; height: 20px; position: relative; }
  .marquee-text {
    position: absolute;
    white-space: nowrap;
    font-size: 13px;
    font-weight: 700;
    color: #fff;
    animation: marquee 14s linear infinite;
  }
  @keyframes marquee {
    from { transform: translateX(100vw); }
    to   { transform: translateX(-100%); }
  }

  /* ─── 섹션 카드 ──────────────────────────────── */
  .card {
    background: var(--surface);
    border: 1.5px solid var(--border);
    border-radius: 14px;
    padding: 16px;
    margin: 12px 12px 0;
  }
  .card-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 12px;
  }
  .card-title {
    display: flex;
    align-items: center;
    gap: 6px;
    font-size: 14px;
    font-weight: 900;
    color: var(--text);
  }
  .badge-green {
    background: var(--green-l);
    color: var(--green2);
    border-radius: 999px;
    padding: 3px 10px;
    font-size: 11px;
    font-weight: 700;
  }
  .badge-pink {
    background: var(--pink-l);
    color: var(--pink2);
    border-radius: 999px;
    padding: 3px 10px;
    font-size: 11px;
    font-weight: 700;
  }

  /* ─── 기간 헤더 ──────────────────────────────── */
  .period-bar {
    margin: 10px 12px 0;
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0 2px;
  }
  .period-text { font-size: 12px; color: var(--text3); display: flex; align-items: center; gap: 4px; }
  .btn-setting {
    display: flex; align-items: center; gap: 4px;
    font-size: 10px; font-weight: 700; color: var(--text3);
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 999px;
    padding: 3px 8px;
    cursor: pointer;
    transition: color .2s, border-color .2s;
  }
  .btn-setting:hover { color: var(--green); border-color: var(--green); }

  /* ─── 창제 시간 기록 (이미지 1 스타일) ──────── */
  .forest-label {
    font-size: 11px;
    color: var(--text3);
    text-align: center;
    margin-bottom: 10px;
  }

  /* 창제표 그리드 */
  .changjae-grid {
    display: grid;
    grid-template-columns: repeat(14, 1fr);
    gap: 3px;
    width: 100%;
  }
  .changjae-cell {
    aspect-ratio: 1;
    border-radius: 4px;
    position: relative;
    transition: opacity .2s;
  }
  /* 이모지 나무/장미 – 완료된 블록에만 표시 */
  .changjae-cell .tree-emoji {
    position: absolute;
    inset: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 10px;
    line-height: 1;
    pointer-events: none;
  }

  /* 범례 */
  .legend-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-top: 10px;
    padding: 0 2px;
  }
  .legend-swatches { display: flex; align-items: center; gap: 3px; }
  .legend-swatch { width: 14px; height: 14px; border-radius: 3px; }
  .legend-label { font-size: 10px; color: var(--text3); }
  .forest-count {
    text-align: center;
    margin-top: 10px;
    font-size: 13px;
    font-weight: 700;
    color: var(--text2);
  }
  .forest-count span { color: var(--green2); font-weight: 900; }

  /* ─── 활동 / 회합 하트 그리드 (이미지 2) ─── */
  .activity-count-label {
    font-size: 18px;
    font-weight: 900;
  }
  .activity-count-label.pink  { color: var(--pink); }
  .activity-count-label.orange { color: #ffab5e; }

  .heart-grid {
    display: grid;
    gap: 4px;
    width: 100%;
    margin-top: 4px;
  }
  .heart-cell {
    aspect-ratio: 1;
    border-radius: 6px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 14px;
  }

  /* ─── 프로그레스 바 ──────────────────────────── */
  .progress-wrap { margin-top: 12px; }
  .progress-between {
    display: flex; justify-content: space-between;
    font-size: 11px; color: var(--text3); margin-bottom: 4px;
  }
  .progress-track {
    height: 7px; background: var(--border); border-radius: 999px; overflow: hidden;
  }
  .progress-fill {
    height: 100%;
    border-radius: 999px;
    background: linear-gradient(90deg, var(--green), var(--green2));
    transition: width .6s ease;
  }

  /* ─── 기원문 ────────────────────────────────── */
  .prayer-box {
    background: var(--green-l);
    border-radius: 10px;
    padding: 10px 14px;
    text-align: center;
    font-size: 12px;
    color: var(--text2);
    font-style: italic;
    margin-bottom: 14px;
  }

  /* ─── 설정 모달 ──────────────────────────────── */
  .modal-backdrop {
    display: none;
    position: fixed; inset: 0;
    background: rgba(0,0,0,.45);
    z-index: 100;
    align-items: center; justify-content: center; padding: 20px;
  }
  .modal-backdrop.open { display: flex; }
  .modal-box {
    background: var(--surface);
    border-radius: 16px;
    padding: 22px 18px;
    width: 100%; max-width: 360px;
    max-height: 90vh; overflow-y: auto;
  }
  .modal-title {
    text-align: center; font-size: 16px; font-weight: 900;
    color: var(--text); margin-bottom: 16px;
  }
  .form-label { font-size: 12px; font-weight: 700; color: var(--text2); margin-bottom: 5px; display: block; }
  .form-group { margin-bottom: 14px; }
  .form-input {
    width: 100%; border: 1.5px solid var(--border); border-radius: 9px;
    background: var(--bg); padding: 10px 12px;
    font-size: 14px; color: var(--text); outline: none;
    font-family: inherit;
  }
  .form-input:focus { border-color: var(--green); }
  .grid2 { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 14px; }
  .btn-row { display: flex; gap: 10px; margin-top: 8px; }
  .btn {
    flex: 1; padding: 11px; border-radius: 9px;
    font-size: 13px; font-weight: 700; cursor: pointer; border: none;
    font-family: inherit;
  }
  .btn-cancel { background: var(--surface); border: 1.5px solid var(--border); color: var(--text2); }
  .btn-save   { background: var(--green); color: #fff; }

  /* ─── 봄 정진 뱃지 ───────────────────────────── */
  .spring-badge {
    background: var(--green-l);
    color: var(--green2);
    border: 1.5px solid var(--green);
    border-radius: 999px;
    font-size: 10px;
    font-weight: 700;
    padding: 2px 9px;
  }

  /* ─── 반응형 폰트 ────────────────────────────── */
  @media (max-width: 360px) {
    .changjae-cell .tree-emoji { font-size: 8px; }
    .heart-cell { font-size: 12px; }
  }
</style>
</head>
<body>
<div class="app-wrap">

  <!-- 전광판 -->
  <div class="marquee-bar">
    <span>✨</span>
    <div class="marquee-inner">
      <span class="marquee-text" id="marqueeText">오늘도 정진하는 당신이 멋져요! 한 걸음 한 걸음이 큰 성장이 됩니다</span>
    </div>
  </div>

  <!-- 기간 표시 -->
  <div class="period-bar">
    <div class="period-text">📅 <span id="periodDisplay"></span></div>
    <button class="btn-setting" onclick="openModal()">
      ⚙️ 창제표
    </button>
  </div>

  <!-- ====== 창제 시간 기록 카드 ====== -->
  <div class="card">
    <div class="card-header">
      <div class="card-title">🌲 창제 시간 기록</div>
      <span class="spring-badge" id="springBadge">봄 정진 기간</span>
    </div>

    <!-- 기원문 -->
    <div class="prayer-box" id="prayerBox"></div>

    <!-- 그리드 -->
    <div class="changjae-grid" id="changjaeGrid"></div>

    <!-- 범례 -->
    <div class="legend-row">
      <div class="legend-swatches">
        <span class="legend-label">0분</span>
        <div class="legend-swatch" style="background:#e0e0e0"></div>
        <div class="legend-swatch" style="background:var(--g0)"></div>
        <div class="legend-swatch" style="background:var(--g1)"></div>
        <div class="legend-swatch" style="background:var(--g2)"></div>
        <div class="legend-swatch" style="background:var(--g3)"></div>
        <div class="legend-swatch" style="background:var(--g4)"></div>
        <span class="legend-label">180분+</span>
      </div>
      <span class="badge-green" id="progressBadge">0% 달성</span>
    </div>

    <!-- 진행 바 -->
    <div class="progress-wrap">
      <div class="progress-between">
        <span>완료: <b id="completedTime"></b></span>
        <span>목표: <b id="goalTime"></b></span>
      </div>
      <div class="progress-track">
        <div class="progress-fill" id="progressFill" style="width:0%"></div>
      </div>
    </div>

    <!-- 나무 카운트 -->
    <div class="forest-count">총 <span id="treeCount">0</span> 그루의 나무가 자랐어요! 🌳</div>
  </div>

  <!-- ====== 활동 횟수 카드 ====== -->
  <div class="card">
    <div class="card-header">
      <div class="card-title">💬 활동 횟수</div>
      <span class="activity-count-label pink" id="activityCountLabel">156회</span>
    </div>
    <div class="heart-grid" id="activityGrid" style="grid-template-columns: repeat(14,1fr);"></div>
  </div>

  <!-- ====== 회합 참석 카드 ====== -->
  <div class="card">
    <div class="card-header">
      <div class="card-title">🧡 회합 참석</div>
      <span class="activity-count-label orange" id="meetingCountLabel">23회</span>
    </div>
    <div class="heart-grid" id="meetingGrid" style="grid-template-columns: repeat(14,1fr);"></div>
  </div>

</div><!-- /app-wrap -->

<!-- ====== 설정 모달 ====== -->
<div class="modal-backdrop" id="modalBackdrop">
  <div class="modal-box">
    <div class="modal-title">창제표 설정</div>

    <div class="form-group">
      <label class="form-label">목표 창제 시간 (시간)</label>
      <input class="form-input" type="number" id="inputGoalHours" min="1" max="500" value="50" />
    </div>
    <div class="form-group">
      <label class="form-label">완료된 블록 수 (1블록=30분)</label>
      <input class="form-input" type="number" id="inputCompletedBlocks" min="0" value="78" />
    </div>
    <div class="grid2">
      <div>
        <label class="form-label">시작일</label>
        <input class="form-input" type="date" id="inputStartDate" />
      </div>
      <div>
        <label class="form-label">종료일</label>
        <input class="form-input" type="date" id="inputEndDate" />
      </div>
    </div>
    <div class="form-group">
      <label class="form-label">기원문</label>
      <textarea class="form-input" id="inputPrayer" rows="3" style="resize:none;">세계 평화와 일체 중생의 행복을 기원합니다</textarea>
    </div>
    <div class="form-group">
      <label class="form-label">활동 횟수</label>
      <input class="form-input" type="number" id="inputActivity" min="0" value="156" />
    </div>
    <div class="form-group">
      <label class="form-label">회합 참석 횟수</label>
      <input class="form-input" type="number" id="inputMeeting" min="0" value="23" />
    </div>
    <div class="form-group">
      <label class="form-label">봄 정진 기간 뱃지 텍스트</label>
      <input class="form-input" type="text" id="inputBadge" value="봄 정진 기간" maxlength="12" />
    </div>

    <div class="btn-row">
      <button class="btn btn-cancel" onclick="closeModal()">취소</button>
      <button class="btn btn-save" onclick="saveAndClose()">저장</button>
    </div>
  </div>
</div>

<script>
/* ─── 상태 ─────────────────────────────────── */
let state = {
  goalMinutes: 50 * 60,
  completedBlocks: 78,
  startDate: '2026-03-01',
  endDate:   '2026-04-30',
  prayer:    '세계 평화와 일체 중생의 행복을 기원합니다',
  activityCount: 156,
  meetingCount:  23,
  badgeText: '봄 정진 기간',
};

/* ─── 나무 이모지 세트 (완료 블록에 가끔 표시) ─ */
const TREE_EMOJIS = ['🌲','🌳','🌴','🌿','🪴'];
// 도끼/삽 이모지도 이미지처럼 적당히 섞기
const SPECIAL_EMOJI = ['⛏️','🪓','🌸','🎋'];

/* ─── 블록 색상 계산 ────────────────────────── */
const GREEN_SHADES = [
  'var(--g0)','var(--g1)','var(--g2)','var(--g3)','var(--g4)'
];
function blockColor(blockIdx, totalBlocks) {
  // 전체 블록에서 위치 비율로 색 결정
  const ratio = blockIdx / (totalBlocks - 1 || 1);
  const idx = Math.round(ratio * (GREEN_SHADES.length - 1));
  return GREEN_SHADES[idx];
}

/* ─── 창제표 그리드 렌더링 ─────────────────── */
function renderChanjaGrid() {
  const grid = document.getElementById('changjaeGrid');
  const COLS = 14;
  const totalBlocks = Math.ceil(state.goalMinutes / 30); // 30분 = 1블록
  const rows = Math.ceil(totalBlocks / COLS);
  const totalCells = rows * COLS;

  grid.innerHTML = '';
  grid.style.gridTemplateColumns = `repeat(${COLS}, 1fr)`;

  // 세로 방향으로 채워지도록 (왼쪽 위부터 오른쪽 아래)
  // 완료 블록 수
  const filled = Math.min(state.completedBlocks, totalCells);

  // 특수 이모지를 랜덤 위치에 배치
  const specialPositions = new Set();
  for (let i = 0; i < Math.floor(filled / 18); i++) {
    specialPositions.add(Math.floor(Math.random() * filled));
  }

  for (let i = 0; i < totalCells; i++) {
    const cell = document.createElement('div');
    cell.className = 'changjae-cell';

    if (i < filled) {
      // 완료된 블록
      cell.style.background = blockColor(i, totalCells);
      // 이모지 표시 (일부에만)
      const emojiSpan = document.createElement('span');
      emojiSpan.className = 'tree-emoji';
      if (specialPositions.has(i)) {
        emojiSpan.textContent = SPECIAL_EMOJI[i % SPECIAL_EMOJI.length];
      } else if (i % 22 === 0) {
        emojiSpan.textContent = TREE_EMOJIS[i % TREE_EMOJIS.length];
      }
      cell.appendChild(emojiSpan);
    } else if (i < totalCells) {
      // 미완료 블록 (목표 범위 내)
      cell.style.background = '#e0e0e0';
    } else {
      cell.style.background = 'transparent';
    }
    grid.appendChild(cell);
  }

  // 진행률
  const progress = Math.round((state.completedBlocks / totalBlocks) * 100);
  document.getElementById('progressBadge').textContent = `${Math.min(progress,100)}% 달성`;
  document.getElementById('progressFill').style.width = `${Math.min(progress,100)}%`;

  // 완료 시간 표시
  const completedMins = state.completedBlocks * 30;
  const h = Math.floor(completedMins / 60), m = completedMins % 60;
  document.getElementById('completedTime').textContent = `${h}시간 ${m}분`;
  document.getElementById('goalTime').textContent = `${Math.floor(state.goalMinutes/60)}시간`;

  // 나무 카운트 = 완료된 블록 수
  document.getElementById('treeCount').textContent = filled.toLocaleString('ko-KR');
}

/* ─── 하트 그리드 렌더링 ────────────────────── */
function renderHeartGrid(containerId, count, bgColor, emoji) {
  const grid = document.getElementById(containerId);
  grid.innerHTML = '';
  const COLS = 14;
  const rows = Math.ceil(count / COLS);
  grid.style.gridTemplateColumns = `repeat(${COLS}, 1fr)`;

  for (let i = 0; i < rows * COLS; i++) {
    const cell = document.createElement('div');
    cell.className = 'heart-cell';
    if (i < count) {
      cell.style.background = bgColor;
      cell.textContent = emoji;
    } else {
      cell.style.background = 'transparent';
    }
    grid.appendChild(cell);
  }
}

/* ─── 전체 렌더 ──────────────────────────────── */
function render() {
  // 기간 표시
  const fmt = d => {
    const [y,m,dy] = d.split('-');
    return `${y}.${m}.${dy}`;
  };
  document.getElementById('periodDisplay').textContent =
    `${fmt(state.startDate)} ~ ${fmt(state.endDate)}`;

  // 기원문
  document.getElementById('prayerBox').textContent = `"${state.prayer}"`;

  // 봄 뱃지
  document.getElementById('springBadge').textContent = state.badgeText;

  // 창제 그리드
  renderChanjaGrid();

  // 활동
  document.getElementById('activityCountLabel').textContent = `${state.activityCount}회`;
  renderHeartGrid('activityGrid', state.activityCount, '#f8bbd0', '💗');

  // 회합
  document.getElementById('meetingCountLabel').textContent = `${state.meetingCount}회`;
  renderHeartGrid('meetingGrid', state.meetingCount, '#ffe0b2', '🧡');
}

/* ─── 모달 ───────────────────────────────────── */
function openModal() {
  document.getElementById('inputGoalHours').value      = Math.floor(state.goalMinutes / 60);
  document.getElementById('inputCompletedBlocks').value= state.completedBlocks;
  document.getElementById('inputStartDate').value      = state.startDate;
  document.getElementById('inputEndDate').value        = state.endDate;
  document.getElementById('inputPrayer').value         = state.prayer;
  document.getElementById('inputActivity').value       = state.activityCount;
  document.getElementById('inputMeeting').value        = state.meetingCount;
  document.getElementById('inputBadge').value          = state.badgeText;
  document.getElementById('modalBackdrop').classList.add('open');
}
function closeModal() {
  document.getElementById('modalBackdrop').classList.remove('open');
}
function saveAndClose() {
  state.goalMinutes      = parseInt(document.getElementById('inputGoalHours').value)  * 60 || 3000;
  state.completedBlocks  = parseInt(document.getElementById('inputCompletedBlocks').value) || 0;
  state.startDate        = document.getElementById('inputStartDate').value || state.startDate;
  state.endDate          = document.getElementById('inputEndDate').value   || state.endDate;
  state.prayer           = document.getElementById('inputPrayer').value    || state.prayer;
  state.activityCount    = parseInt(document.getElementById('inputActivity').value) || 0;
  state.meetingCount     = parseInt(document.getElementById('inputMeeting').value)  || 0;
  state.badgeText        = document.getElementById('inputBadge').value     || '봄 정진 기간';
  closeModal();
  render();
}

// 모달 바깥 클릭 닫기
document.getElementById('modalBackdrop').addEventListener('click', function(e) {
  if (e.target === this) closeModal();
});

/* ─── 전광판 자동 교체 ──────────────────────── */
const MESSAGES = [
  '오늘도 정진하는 당신이 멋져요! 한 걸음 한 걸음이 큰 성장이 됩니다',
  '꾸준함이 기적을 만들어요. 당신의 노력은 반드시 결실을 맺습니다',
  '오늘의 작은 실천이 내일의 큰 변화로 이어집니다',
  '포기하지 않는 당신을 응원해요! 매일 조금씩, 그게 비결이에요',
  '성장하는 당신의 모습이 아름다워요. 함께 전진합시다!',
];
let msgIdx = 0;
function rotateMarquee() {
  msgIdx = (msgIdx + 1) % MESSAGES.length;
  const el = document.getElementById('marqueeText');
  el.style.animation = 'none';
  el.textContent = MESSAGES[msgIdx];
  void el.offsetWidth;
  el.style.animation = '';
}
setInterval(rotateMarquee, 14000);

/* ─── 초기 실행 ──────────────────────────────── */
render();
</script>
</body>
</html>
